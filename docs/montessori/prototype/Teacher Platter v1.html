<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Mitable Montessori — Teacher Platter v1</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.5/babel.min.js"></script>
<style>
  :root {
    --canvas: #FAF6EE;
    --surface: #FFFBF3;
    --muted: #F2EDE0;
    --ink: #2A2723;
    --ink-secondary: #5C544A;
    --ink-muted: #9C9285;
    --border: #E0D8C8;
    --border-strong: #B89880;
    --terracotta: #C46A4F;
    --terracotta-soft: #F4DDD2;
    --terracotta-deep: #A24A3D;
    --sage: #7A9B7A;
    --sage-soft: #DDE7DA;
    --butter: #E8C56A;
    --butter-soft: #F6E8B8;
    --dusty-blue: #6B8AA6;
    --dusty-blue-soft: #D2DCE5;
    --clay: #B89880;
    --clay-soft: #E5D8C8;
  }
  html, body {
    background: var(--canvas);
    color: var(--ink);
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* Subtle paper texture — barely visible, but felt. */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.15 0 0 0 0 0.13 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  .font-display { font-family: 'Caveat', cursive; font-weight: 500; }
  .font-numeric { font-variant-numeric: tabular-nums; }
  .label-cap { letter-spacing: 0.06em; text-transform: uppercase; font-size: 11px; font-weight: 500; }
  .scroll-shadow {
    background:
      linear-gradient(var(--surface) 30%, rgba(255,251,243,0)),
      linear-gradient(rgba(255,251,243,0), var(--surface) 70%) bottom,
      radial-gradient(farthest-side at 50% 0, rgba(42,39,35,0.06), rgba(0,0,0,0)),
      radial-gradient(farthest-side at 50% 100%, rgba(42,39,35,0.06), rgba(0,0,0,0)) bottom;
    background-repeat: no-repeat;
    background-size: 100% 30px, 100% 30px, 100% 12px, 100% 12px;
    background-attachment: local, local, scroll, scroll;
  }
  /* hide scrollbars inside iphone screens */
  .ios-content::-webkit-scrollbar { display: none; }
  .ios-content { scrollbar-width: none; }
</style>
</head>
<body class="relative">

<div id="root" class="relative z-10"></div>

<script type="text/babel" data-presets="react">
/* ============================================================
   IosFrame — inlined from huashu-design assets/ios_frame.jsx
   Adapted: cream screen background instead of #fff (no white).
   ============================================================ */
const iosFrameStyles = {
  wrapper: {
    display: 'inline-block',
    padding: 12,
    background: '#1a1a1a',
    borderRadius: 60,
    boxShadow: '0 0 0 2px #2a2723, 0 30px 80px rgba(42,39,35,0.18), 0 8px 20px rgba(42,39,35,0.08)',
    position: 'relative',
  },
  screen: {
    position: 'relative',
    borderRadius: 48,
    overflow: 'hidden',
    background: 'var(--canvas)',
  },
  statusBar: {
    position: 'absolute', top: 0, left: 0, right: 0, height: 54,
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '0 32px', fontSize: 16, fontWeight: 600,
    fontFamily: '-apple-system, "SF Pro Text", sans-serif', zIndex: 20, pointerEvents: 'none',
  },
  dynamicIsland: {
    position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)',
    width: 124, height: 36, background: '#000', borderRadius: 999, zIndex: 30,
  },
  statusIcons: { display: 'flex', alignItems: 'center', gap: 6 },
  signalIcon: { display: 'flex', alignItems: 'flex-end', gap: 2, height: 12 },
  signalBar: { width: 3, background: 'currentColor', borderRadius: 1 },
  batteryIcon: { width: 26, height: 12, border: '1.5px solid currentColor', borderRadius: 3, padding: 1, position: 'relative', opacity: 0.85 },
  batteryCap: { position: 'absolute', top: 3, right: -3, width: 2, height: 6, background: 'currentColor', borderRadius: '0 1px 1px 0' },
  content: { position: 'absolute', top: 54, left: 0, right: 0, bottom: 34, overflow: 'auto' },
  homeIndicator: { position: 'absolute', bottom: 10, left: '50%', transform: 'translateX(-50%)', width: 140, height: 5, background: 'rgba(42,39,35,0.28)', borderRadius: 999, zIndex: 10 },
};

function IosFrame({ children, width = 393, height = 852, time = '9:41', battery = 86 }) {
  return (
    <div style={iosFrameStyles.wrapper}>
      <div style={{ ...iosFrameStyles.screen, width, height }}>
        <div style={{ ...iosFrameStyles.statusBar, color: 'var(--ink)' }}>
          <span>{time}</span>
          <div style={iosFrameStyles.statusIcons}>
            <div style={iosFrameStyles.signalIcon}>
              <div style={{ ...iosFrameStyles.signalBar, height: 4 }} />
              <div style={{ ...iosFrameStyles.signalBar, height: 6 }} />
              <div style={{ ...iosFrameStyles.signalBar, height: 9 }} />
              <div style={{ ...iosFrameStyles.signalBar, height: 11 }} />
            </div>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor" />
              <path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" />
              <path d="M1 4.5a11 11 0 0114 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" opacity="0.7" />
            </svg>
            <div style={iosFrameStyles.batteryIcon}>
              <div style={{ width: `${battery}%`, height: '100%', background: 'currentColor', borderRadius: 1, opacity: 0.9 }} />
              <div style={iosFrameStyles.batteryCap} />
            </div>
          </div>
        </div>
        <div style={iosFrameStyles.dynamicIsland} />
        <div className="ios-content" style={iosFrameStyles.content}>{children}</div>
        <div style={iosFrameStyles.homeIndicator} />
      </div>
    </div>
  );
}

/* ============================================================
   Hand-drawn marks — static SVGs.
   Always in clay or terracotta. Used sparingly per brandbook.
   ============================================================ */
const HandUnderline = ({ color = 'var(--terracotta)', width = 120, style }) => (
  <svg width={width} height="10" viewBox="0 0 120 10" style={{ display: 'block', ...style }}>
    <path d="M2 6 C 22 2, 48 9, 72 4 S 110 7, 118 5"
      fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" />
  </svg>
);
const HandCheck = ({ color = 'var(--sage)', size = 22 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
    <path d="M3.5 12.5 C 6 14, 8 16.5, 10 19 C 13 13, 17 7.5, 22 4"
      stroke={color} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" />
  </svg>
);
const HandArrow = ({ color = 'var(--clay)', size = 20 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
    <path d="M3 12 C 8 11.5, 14 12.2, 20 12" stroke={color} strokeWidth="2" strokeLinecap="round" />
    <path d="M15 7 C 18 9, 20 11, 21 12 C 19 13, 17 14.5, 15 17"
      stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" />
  </svg>
);
const HandDivider = ({ color = 'var(--clay)', width = '100%' }) => (
  <svg viewBox="0 0 200 8" preserveAspectRatio="none" style={{ width, height: 8, display: 'block' }}>
    <path d="M2 5 C 50 2, 100 7, 150 3 S 198 5, 198 5"
      stroke={color} strokeWidth="1.4" fill="none" strokeLinecap="round" opacity="0.7" />
  </svg>
);

/* Lucide-style icons (line, 1.5 stroke, rounded) — only the few we need. */
const Icon = {
  Mic: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/></svg>),
  Plus: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>),
  Home: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>),
  Users: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><circle cx="17" cy="9" r="2.5"/><path d="M14.5 20c0-2 2-3.5 4.5-3.5"/></svg>),
  Check: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13l4 4L19 7"/></svg>),
  Inbox: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 13l3-8h12l3 8"/><path d="M3 13v6h18v-6"/><path d="M3 13h5l1 2h6l1-2h5"/></svg>),
  Pencil: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 4l5 5L9 20H4v-5z"/><path d="M14 5l5 5"/></svg>),
  Chevron: (p) => (<svg viewBox="0 0 24 24" width={p.size||16} height={p.size||16} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6"/></svg>),
  Search: (p) => (<svg viewBox="0 0 24 24" width={p.size||18} height={p.size||18} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="6.5"/><path d="M20 20l-3.5-3.5"/></svg>),
  Calendar: (p) => (<svg viewBox="0 0 24 24" width={p.size||18} height={p.size||18} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>),
  Sparkle: (p) => (<svg viewBox="0 0 24 24" width={p.size||18} height={p.size||18} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 4v4M12 16v4M4 12h4M16 12h4M6 6l2.5 2.5M15.5 15.5L18 18M6 18l2.5-2.5M15.5 8.5L18 6"/></svg>),
};

/* ============================================================
   Reusable mini-components within the iPhone screens
   ============================================================ */
function Avatar({ initials, tone = 'clay', size = 36 }) {
  const tones = {
    clay: { bg: 'var(--clay-soft)', fg: 'var(--terracotta-deep)' },
    sage: { bg: 'var(--sage-soft)', fg: '#3F5C40' },
    butter: { bg: 'var(--butter-soft)', fg: '#7A5C0F' },
    blue: { bg: 'var(--dusty-blue-soft)', fg: '#33526E' },
    terracotta: { bg: 'var(--terracotta-soft)', fg: 'var(--terracotta-deep)' },
  };
  const t = tones[tone];
  return (
    <div style={{
      width: size, height: size, borderRadius: 999,
      background: t.bg, color: t.fg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontWeight: 600, fontSize: size * 0.36, letterSpacing: '0.02em', flexShrink: 0,
    }}>{initials}</div>
  );
}

function TabBar({ active }) {
  const tabs = [
    { id: 'today', label: 'Today', Icon: Icon.Home },
    { id: 'roster', label: 'Roster', Icon: Icon.Users },
    { id: 'capture', label: '', Icon: Icon.Mic, primary: true },
    { id: 'pending', label: 'Review', Icon: Icon.Inbox, badge: 3 },
    { id: 'reports', label: 'Reports', Icon: Icon.Pencil },
  ];
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      paddingTop: 8, paddingBottom: 26,
      background: 'var(--surface)',
      borderTop: '1px solid var(--border)',
      display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)',
      alignItems: 'center', gap: 4,
    }}>
      {tabs.map(t => {
        const isActive = t.id === active;
        if (t.primary) {
          return (
            <div key={t.id} style={{ display: 'flex', justifyContent: 'center', position: 'relative', top: -16 }}>
              <div style={{
                width: 56, height: 56, borderRadius: 999,
                background: 'var(--terracotta)', color: '#FFFBF3',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: '0 8px 18px rgba(196,106,79,0.35)',
              }}>
                <t.Icon size={24} />
              </div>
            </div>
          );
        }
        return (
          <div key={t.id} style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
            color: isActive ? 'var(--ink)' : 'var(--ink-muted)', position: 'relative',
          }}>
            <t.Icon size={22} />
            <span style={{ fontSize: 11, fontWeight: 500 }}>{t.label}</span>
            {t.badge && (
              <div style={{
                position: 'absolute', top: -2, right: 'calc(50% - 18px)',
                background: 'var(--terracotta)', color: 'var(--surface)',
                fontSize: 10, fontWeight: 600,
                width: 16, height: 16, borderRadius: 999,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>{t.badge}</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function ScreenHeader({ overline, title, action }) {
  return (
    <div style={{ padding: '12px 24px 16px' }}>
      {overline && (
        <div className="label-cap" style={{ color: 'var(--ink-muted)', marginBottom: 4 }}>{overline}</div>
      )}
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 12 }}>
        <h1 style={{ fontSize: 26, fontWeight: 600, lineHeight: 1.2, color: 'var(--ink)', letterSpacing: '-0.01em' }}>{title}</h1>
        {action}
      </div>
    </div>
  );
}

/* ============================================================
   SCREEN 1 — Today
   Role: functional baseline. Snapshot of the work cycle in progress.
   ============================================================ */
function ScreenToday() {
  return (
    <div style={{ background: 'var(--canvas)', minHeight: '100%', paddingBottom: 96 }}>
      <ScreenHeader
        overline="Tuesday · April 30"
        title={<span>Good morning, <span className="font-display" style={{ fontSize: 34, color: 'var(--terracotta-deep)' }}>Anna</span></span>}
      />
      <div style={{ padding: '0 24px' }}>
        <div style={{ color: 'var(--ink-secondary)', fontSize: 14, marginBottom: 20 }}>
          Your work cycle starts in 22 minutes.
        </div>

        {/* Attendance card */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 16, padding: 18, marginBottom: 14 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <div className="label-cap" style={{ color: 'var(--ink-secondary)' }}>Primrose Room</div>
            <span style={{ fontSize: 12, color: 'var(--sage)', fontWeight: 500 }}>Attendance open</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
            <span className="font-numeric" style={{ fontSize: 38, fontWeight: 600, color: 'var(--ink)' }}>14</span>
            <span style={{ fontSize: 14, color: 'var(--ink-secondary)' }}>of 18 children present</span>
          </div>
          <div style={{ display: 'flex', gap: 6, marginTop: 12, flexWrap: 'wrap' }}>
            {['IM','EO','LS','RC','AT','MK','FN','AD','JR','PM','TW','VL','BC','OH'].map((i,k) => (
              <Avatar key={k} initials={i} size={26} tone={['clay','sage','butter','blue'][k%4]} />
            ))}
            {['_','_','_','_'].map((_,k) => (
              <div key={`a${k}`} style={{
                width: 26, height: 26, borderRadius: 999,
                border: '1.5px dashed var(--border-strong)', background: 'transparent', opacity: 0.5
              }} />
            ))}
          </div>
        </div>

        {/* Pending review nudge */}
        <div style={{
          background: 'var(--terracotta-soft)', border: '1px solid #E8C0AE',
          borderRadius: 16, padding: 16, marginBottom: 14,
          display: 'flex', alignItems: 'center', gap: 14,
        }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 600, fontSize: 15, color: 'var(--ink)', marginBottom: 2 }}>
              3 observations need a moment
            </div>
            <div style={{ fontSize: 13, color: 'var(--ink-secondary)' }}>
              Drafted from yesterday afternoon's capture.
            </div>
          </div>
          <Icon.Chevron size={18} />
        </div>

        {/* Recent commands */}
        <div className="label-cap" style={{ color: 'var(--ink-muted)', margin: '20px 0 8px' }}>Recently captured</div>
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 16, overflow: 'hidden' }}>
          {[
            { who: 'Ada', what: 'returned to the binomial cube', when: '8:42a', tone: 'clay' },
            { who: 'Levi', what: 'first presentation, sandpaper letters', when: '8:30a', tone: 'butter' },
            { who: 'Mira', what: 'mastered teen board sequencing', when: '8:14a', tone: 'sage' },
          ].map((r,i) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 12,
              padding: '14px 16px',
              borderTop: i ? '1px solid var(--border)' : 'none',
            }}>
              <Avatar initials={r.who.slice(0,2).toUpperCase()} tone={r.tone} size={32} />
              <div style={{ flex: 1, fontSize: 14, color: 'var(--ink)' }}>
                <span style={{ fontWeight: 600 }}>{r.who}</span>{' '}
                <span style={{ color: 'var(--ink-secondary)' }}>{r.what}</span>
              </div>
              <div className="font-numeric" style={{ fontSize: 12, color: 'var(--ink-muted)' }}>{r.when}</div>
            </div>
          ))}
        </div>
      </div>
      <TabBar active="today" />
    </div>
  );
}

/* ============================================================
   SCREEN 2 — Quick-add: voice listening
   Role: the brand's emotional hero. Cream paper, big breathing mic.
   ============================================================ */
function ScreenQuickAdd() {
  return (
    <div style={{ background: 'var(--canvas)', minHeight: '100%', paddingBottom: 24, position: 'relative' }}>
      {/* Soft hand-drawn frame around the capture surface */}
      <div style={{ padding: '20px 24px 0' }}>
        <div className="label-cap" style={{ color: 'var(--ink-muted)' }}>Capture · Primrose Room</div>
      </div>

      <div style={{ padding: '12px 20px 0' }}>
        <div style={{
          background: 'var(--surface)', borderRadius: 24, padding: '32px 22px 26px',
          border: '1px solid var(--border)',
          position: 'relative', minHeight: 540,
          boxShadow: '0 4px 12px rgba(42,39,35,0.05)',
        }}>
          {/* Hand-drawn corner marks */}
          <svg style={{ position: 'absolute', top: -6, left: -6 }} width="44" height="44" viewBox="0 0 44 44" fill="none">
            <path d="M6 22 C 6 12, 12 6, 22 6" stroke="var(--clay)" strokeWidth="1.6" strokeLinecap="round" fill="none" />
          </svg>
          <svg style={{ position: 'absolute', bottom: -6, right: -6 }} width="44" height="44" viewBox="0 0 44 44" fill="none">
            <path d="M22 38 C 32 38, 38 32, 38 22" stroke="var(--clay)" strokeWidth="1.6" strokeLinecap="round" fill="none" />
          </svg>

          <div className="font-display" style={{ fontSize: 40, color: 'var(--ink)', textAlign: 'center', lineHeight: 1.05 }}>
            I'm listening.
          </div>
          <div style={{ textAlign: 'center', color: 'var(--ink-secondary)', fontSize: 14, marginTop: 6 }}>
            Speak as you observe. We'll sort it after.
          </div>

          {/* Live transcript area */}
          <div style={{
            marginTop: 28, padding: '16px 4px',
            color: 'var(--ink)', fontSize: 17, lineHeight: 1.55,
            minHeight: 180,
          }}>
            <span>Ada chose the pink tower for the third time this week. She built it correctly on the first try and </span>
            <span style={{ color: 'var(--ink-secondary)' }}>spent about ten minutes refining </span>
            <span style={{ color: 'var(--ink-muted)' }}>the placement of the smallest cube</span>
            <span style={{
              display: 'inline-block', width: 2, height: 18, marginLeft: 2,
              background: 'var(--terracotta)', verticalAlign: 'middle',
              animation: 'cursorblink 1s steps(2) infinite',
            }} />
          </div>

          {/* Detected entities */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 12 }}>
            <span style={{ background: 'var(--clay-soft)', color: 'var(--terracotta-deep)', borderRadius: 999, padding: '4px 10px', fontSize: 12, fontWeight: 500 }}>Ada Okafor</span>
            <span style={{ background: 'var(--sage-soft)', color: '#3F5C40', borderRadius: 999, padding: '4px 10px', fontSize: 12, fontWeight: 500 }}>Pink tower</span>
            <span style={{ background: 'var(--butter-soft)', color: '#7A5C0F', borderRadius: 999, padding: '4px 10px', fontSize: 12, fontWeight: 500 }}>10 minutes</span>
          </div>
        </div>
      </div>

      {/* Big breathing mic */}
      <div style={{ position: 'absolute', bottom: 56, left: 0, right: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
        <div style={{ position: 'relative', width: 96, height: 96, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{
            position: 'absolute', inset: -16, borderRadius: 999,
            background: 'var(--terracotta)', opacity: 0.15,
            animation: 'breathe 2.6s ease-in-out infinite',
          }} />
          <div style={{
            position: 'absolute', inset: -4, borderRadius: 999,
            background: 'var(--terracotta)', opacity: 0.25,
            animation: 'breathe 2.6s ease-in-out infinite 0.4s',
          }} />
          <div style={{
            width: 84, height: 84, borderRadius: 999,

            <div>Platter v1 · {new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
            <div style={{ marginTop: 2 }}>iPhone 15 Pro · 393 × 852 · cream canvas</div>
          </div>
        </div>
      </div>

      {/* Section divider */}
      <div style={{ maxWidth: 1760, margin: '0 auto', padding: '0 56px' }}>
        <HandDivider color="var(--clay)" />
      </div>

      {/* Platter grid */}
      <div style={{
        maxWidth: 1760, margin: '0 auto',
        padding: '40px 40px 80px',
        display: 'grid',
        gridTemplateColumns: 'repeat(4, 1fr)',
        gap: 56,
        justifyItems: 'center',
      }}>
        {screens.map((s, i) => (
          <div key={s.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
            <div style={{ marginBottom: 14, textAlign: 'center', minHeight: 44 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--ink)', letterSpacing: '-0.005em' }}>
                <span style={{ color: 'var(--terracotta)', marginRight: 6, fontVariantNumeric: 'tabular-nums' }}>{String(i+1).padStart(2,'0')}</span>
                {s.label}
              </div>
              <div className="font-numeric" style={{ fontSize: 11, color: 'var(--ink-muted)', marginTop: 2, fontFamily: 'ui-monospace, SFMono-Regular, monospace' }}>{s.sub}</div>
            </div>
            <IosFrame>
              <s.Comp />
            </IosFrame>
          </div>
        ))}
      </div>

      {/* Footer note */}
      <div style={{ maxWidth: 1760, margin: '0 auto', padding: '0 56px 80px', display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 24, flexWrap: 'wrap' }}>
        <div style={{ fontSize: 13, color: 'var(--ink-secondary)', maxWidth: 720, lineHeight: 1.6 }}>
          <strong style={{ color: 'var(--ink)' }}>Brand notes.</strong>{' '}
          Cream <span className="font-numeric">#FAF6EE</span> is the canvas — never pure white. Display
          font (Caveat) is rare and earned: it appears on the daily greeting, the empty state, and on a
          child's name. Hand-drawn marks live in moments that are worth slowing down for, never on dense
          data UI. Terracotta is reserved for the action. Sage signals a state achieved.
        </div>
        <div style={{ fontSize: 12, color: 'var(--ink-muted)' }}>
          Created by Huashu-Design
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
