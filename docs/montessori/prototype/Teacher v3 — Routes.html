<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Mitable Montessori — Teacher v3 (Routes) · Phone + Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.5/babel.min.js"></script>
<style>
  :root {
    --canvas: #FAF6EE;
    --surface: #FFFBF3;
    --muted: #F2EDE0;
    --ink: #2A2723;
    --ink-secondary: #5C544A;
    --ink-muted: #9C9285;
    --border: #E0D8C8;
    --border-strong: #B89880;
    --terracotta: #C46A4F;
    --terracotta-soft: #F4DDD2;
    --terracotta-deep: #A24A3D;
    --sage: #7A9B7A;
    --sage-soft: #DDE7DA;
    --butter: #E8C56A;
    --butter-soft: #F6E8B8;
    --dusty-blue: #6B8AA6;
    --dusty-blue-soft: #D2DCE5;
    --clay: #B89880;
    --clay-soft: #E5D8C8;
  }
  html, body {
    background: var(--canvas);
    color: var(--ink);
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.15 0 0 0 0 0.13 0 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  .font-display { font-family: 'Caveat', cursive; font-weight: 500; }
  .font-numeric { font-variant-numeric: tabular-nums; }
  .label-cap { letter-spacing: 0.06em; text-transform: uppercase; font-size: 11px; font-weight: 500; }
  .ios-content::-webkit-scrollbar, .scroll-quiet::-webkit-scrollbar { width: 6px; }
  .ios-content::-webkit-scrollbar-thumb, .scroll-quiet::-webkit-scrollbar-thumb { background: var(--clay-soft); border-radius: 999px; }
  .ios-content::-webkit-scrollbar-track, .scroll-quiet::-webkit-scrollbar-track { background: transparent; }
  @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.18; } 50% { transform: scale(1.18); opacity: 0.05; } }
  @keyframes dotpulse { 0%, 100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-2px); } }
</style>
</head>
<body class="relative">
<div id="root" class="relative z-10"></div>

<script type="text/babel" data-presets="react">

/* ============================================================
   Hand-drawn marks
   ============================================================ */
const HandUnderline = ({ color = 'var(--terracotta)', width = 120, style }) => (
  <svg width={width} height="10" viewBox="0 0 120 10" style={{ display: 'block', ...style }}>
    <path d="M2 6 C 22 2, 48 9, 72 4 S 110 7, 118 5" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" />
  </svg>
);
const HandCheck = ({ color = 'var(--sage)', size = 22 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
    <path d="M3.5 12.5 C 6 14, 8 16.5, 10 19 C 13 13, 17 7.5, 22 4" stroke={color} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" />
  </svg>
);
const HandDivider = ({ color = 'var(--clay)', width = '100%' }) => (
  <svg viewBox="0 0 200 8" preserveAspectRatio="none" style={{ width, height: 8, display: 'block' }}>
    <path d="M2 5 C 50 2, 100 7, 150 3 S 198 5, 198 5" stroke={color} strokeWidth="1.4" fill="none" strokeLinecap="round" opacity="0.7" />
  </svg>
);

/* ============================================================
   Icons
   ============================================================ */
const Icon = {
  Mic: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/></svg>),
  Camera: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8h3l2-3h8l2 3h3v11H3z"/><circle cx="12" cy="13" r="4"/></svg>),
  Image: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.7"/><path d="M21 16l-5-5-9 9"/></svg>),
  Send: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l15-8-6 18-3-7z"/></svg>),
  Plus: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>),
  MessageSquare: (p) => (<svg viewBox="0 0 24 24" width={p.size||22} height={p.size||22} fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M4 5h16v12H8l-4 4z"/></svg>),
  Home: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>),
  Users: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><circle cx="17" cy="9" r="2.5"/><path d="M14.5 20c0-2 2-3.5 4.5-3.5"/></svg>),
  Book: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h11a3 3 0 0 1 3 3v13H7a3 3 0 0 1-3-3z"/><path d="M4 17a3 3 0 0 1 3-3h11"/></svg>),
  Grid: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg>),
  Calendar: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>),
  Pencil: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 4l5 5L9 20H4v-5z"/><path d="M14 5l5 5"/></svg>),
  Settings: (p) => (<svg viewBox="0 0 24 24" width={p.size||20} height={p.size||20} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.7l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.7-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.7.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.7 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.7.3h.1a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.7-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.7v.1a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>),
  Sparkle: (p) => (<svg viewBox="0 0 24 24" width={p.size||16} height={p.size||16} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 4v4M12 16v4M4 12h4M16 12h4M6 6l2.5 2.5M15.5 15.5L18 18M6 18l2.5-2.5M15.5 8.5L18 6"/></svg>),
  Lock: (p) => (<svg viewBox="0 0 24 24" width={p.size||14} height={p.size||14} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>),
  Chevron: (p) => (<svg viewBox="0 0 24 24" width={p.size||16} height={p.size||16} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6"/></svg>),
  X: (p) => (<svg viewBox="0 0 24 24" width={p.size||16} height={p.size||16} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>),
  Search: (p) => (<svg viewBox="0 0 24 24" width={p.size||18} height={p.size||18} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="6.5"/><path d="M20 20l-3.5-3.5"/></svg>),
  Bell: (p) => (<svg viewBox="0 0 24 24" width={p.size||18} height={p.size||18} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 16V11a6 6 0 0 1 12 0v5l1.5 2H4.5z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>),
  Filter: (p) => (<svg viewBox="0 0 24 24" width={p.size||16} height={p.size||16} fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 5h16M7 12h10M10 19h4"/></svg>),
};

function Avatar({ initials, tone = 'clay', size = 36 }) {
  const tones = {
    clay: { bg: 'var(--clay-soft)', fg: 'var(--terracotta-deep)' },
    sage: { bg: 'var(--sage-soft)', fg: '#3F5C40' },
    butter: { bg: 'var(--butter-soft)', fg: '#7A5C0F' },
    blue: { bg: 'var(--dusty-blue-soft)', fg: '#33526E' },
    terracotta: { bg: 'var(--terracotta-soft)', fg: 'var(--terracotta-deep)' },
  };
  const t = tones[tone];
  return (
    <div style={{
      width: size, height: size, borderRadius: 999,
      background: t.bg, color: t.fg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontWeight: 600, fontSize: size * 0.36, letterSpacing: '0.02em', flexShrink: 0,
    }}>{initials}</div>
  );
}

/* ============================================================
   PHONE — Tab bar (5 spots: Today, Roster, [Chat FAB], Progress, Reports)
   ============================================================ */
function PhoneTabBar({ active }) {
  const tabs = [
    { id: 'today',    label: 'Today',    Icon: Icon.Home },
    { id: 'roster',   label: 'Roster',   Icon: Icon.Users },
    { id: 'chat',     label: 'Chat',     Icon: Icon.MessageSquare, primary: true },
    { id: 'progress', label: 'Progress', Icon: Icon.Grid },
    { id: 'reports',  label: 'Reports',  Icon: Icon.Pencil, badge: 2 },
  ];
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      paddingTop: 8, paddingBottom: 26,
      background: 'var(--surface)', borderTop: '1px solid var(--border)',
      display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)',
      alignItems: 'center', gap: 4,
    }}>
      {tabs.map(t => {
        const isActive = t.id === active;
        if (t.primary) {
          return (
            <div key={t.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', position: 'relative' }}>
              <div style={{ position: 'relative', top: -16 }}>
                <div style={{
                  width: 56, height: 56, borderRadius: 999,
                  background: 'var(--terracotta)', color: 'var(--surface)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  boxShadow: '0 8px 18px rgba(196,106,79,0.35)',
                  border: '4px solid var(--surface)',
                }}>
                  <t.Icon size={22} />
                </div>
              </div>
              <div style={{
                fontSize: 11, fontWeight: 500,
                color: isActive ? 'var(--terracotta)' : 'var(--ink-muted)',
                position: 'relative', top: -10,
              }}>{t.label}</div>
            </div>
          );
        }
        return (
          <div key={t.id} style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
            color: isActive ? 'var(--ink)' : 'var(--ink-muted)', position: 'relative',
          }}>
            <t.Icon size={22} />
            <span style={{ fontSize: 11, fontWeight: 500 }}>{t.label}</span>
            {t.badge && (
              <div style={{
                position: 'absolute', top: -2, right: 'calc(50% - 18px)',
                background: 'var(--terracotta)', color: 'var(--surface)',
                fontSize: 10, fontWeight: 600,
                width: 16, height: 16, borderRadius: 999,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>{t.badge}</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* Compact section header used in phone screens */
function PhoneHeader({ overline, title, action }) {
  return (
    <div style={{ padding: '12px 24px 16px' }}>
      {overline && <div className="label-cap" style={{ color: 'var(--ink-muted)', marginBottom: 4 }}>{overline}</div>}
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 12 }}>
        <h1 style={{ fontSize: 26, fontWeight: 600, lineHeight: 1.2, color: 'var(--ink)', letterSpacing: '-0.01em' }}>{title}</h1>
        {action}
      </div>
    </div>
  );
}

/* ============================================================
   PHONE — Today
   ============================================================ */
function PhoneToday() {
  return (
    <div style={{ background: 'var(--canvas)', minHeight: '100%', paddingBottom: 96 }}>
      <PhoneHeader
        overline="Tuesday · April 30"
        title={<span>Good morning, <span className="font-display" style={{ fontSize: 34, color: 'var(--terracotta-deep)' }}>Anna</span></span>}
      />
      <div style={{ padding: '0 24px' }}>
        <div style={{ color: 'var(--ink-secondary)', fontSize: 14, marginBottom: 20 }}>
          The work cycle started 22 minutes ago.
        </div>

        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 16, padding: 18, marginBottom: 14 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <div className="label-cap" style={{ color: 'var(--ink-secondary)' }}>Primrose Room</div>
            <span style={{ fontSize: 12, color: 'var(--sage)', fontWeight: 500 }}>Attendance open</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
            <span className="font-numeric" style={{ fontSize: 38, fontWeight: 600, color: 'var(--ink)' }}>14</span>
            <span style={{ fontSize: 14, color: 'var(--ink-secondary)' }}>of 18 children present</span>
          </div>
          <div style={{ display: 'flex', gap: 6, marginTop: 12, flexWrap: 'wrap' }}>
            {['IM','EO','LS','RC','AT','MK','FN','AD','JR','PM','TW','VL','BC','OH'].map((i,k) => (
              <Avatar key={k} initials={i} size={26} tone={['clay','sage','butter','blue'][k%4]} />
            ))}
            {['_','_','_','_'].map((_,k) => (
              <div key={`a${k}`} style={{ width: 26, height: 26, borderRadius: 999, border: '1.5px dashed var(--border-strong)', opacity: 0.5 }} />
            ))}
          </div>
        </div>

        <div style={{
          background: 'var(--terracotta-soft)', border: '1px solid #E8C0AE',
          borderRadius: 16, padding: 16, marginBottom: 14,
          display: 'flex', alignItems: 'center', gap: 14,
        }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 600, fontSize: 15, color: 'var(--ink)', marginBottom: 2 }}>2 observations awaiting in chat</div>
            <div style={{ fontSize: 13, color: 'var(--ink-secondary)' }}>Tap chat below to review and approve.</div>
          </div>
          <Icon.Chevron size={18} />
        </div>

        <div className="label-cap" style={{ color: 'var(--ink-muted)', margin: '20px 0 8px' }}>Captured today</div>
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 16, overflow: 'hidden' }}>
          {[
            { who: 'Mira', what: 'mastered teen board sequencing', when: '8:14a', tone: 'sage' },
            { who: 'Levi', what: 'first presentation, sandpaper letters', when: '8:30a', tone: 'butter' },
            { who: 'Ada', what: 'returned to the binomial cube', when: '8:42a', tone: 'clay' },
          ].map((r,i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px', borderTop: i ? '1px solid var(--border)' : 'none' }}>
              <Avatar initials={r.who.slice(0,2).toUpperCase()} tone={r.tone} size={32} />
              <div style={{ flex: 1, fontSize: 14, color: 'var(--ink)' }}>
                <span style={{ fontWeight: 600 }}>{r.who}</span>{' '}
                <span style={{ color: 'var(--ink-secondary)' }}>{r.what}</span>
              </div>
              <div className="font-numeric" style={{ fontSize: 12, color: 'var(--ink-muted)' }}>{r.when}</div>
            </div>
          ))}
        </div>
      </div>
      <PhoneTabBar active="today" />
    </div>
  );
}

/* ============================================================
   PHONE — Roster
   ============================================================ */
function PhoneRoster() {
  const children = [
    { name: 'Ada Okafor',  age: '4y 7m', tone: 'clay',   recent: 'Pink tower · 8:42a' },
    { name: 'Bea Chen',    age: '3y 11m', tone: 'sage',  recent: 'Number rods · yesterday' },
    { name: 'Diego Ramos', age: '5y 2m',  tone: 'butter',recent: 'Map of Africa · yesterday' },
    { name: 'Eli Okonkwo', age: '4y 1m',  tone: 'clay',  recent: 'Metal insets · 8:20a' },
    { name: 'Iris Moreau', age: '3y 9m',  tone: 'blue',  recent: 'Pouring · this morning' },
    { name: 'Kai Nakamura',age: '4y 4m',  tone: 'sage',  recent: 'Trinomial cube · yesterday' },
    { name: 'Levi Schwartz',age:'3y 6m',  tone: 'butter',recent: 'Sandpaper letters · 8:30a' },
    { name: 'Mira Khan',   age: '4y 9m',  tone: 'sage',  recent: 'Teen board · 8:14a' },
    { name: 'Noor Habib',  age: '3y 8m',  tone: 'clay',  recent: 'Practical life · this week' },
    { name: 'Ren Tanaka',  age: '4y 11m', tone: 'blue',  recent: 'Geometry cabinet · this week' },
  ];
  return (
    <div style={{ background: 'var(--canvas)', minHeight: '100%', paddingBottom: 96 }}>
      <PhoneHeader
        overline="Primrose Room · 18 children"
        title="Roster"
        action={
          <button style={{ width: 36, height: 36, borderRadius: 10, border: '1px solid var(--border)', background: 'var(--surface)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--ink-secondary)' }}>
            <Icon.Search />
          </button>
        }
      />
      <div style={{ padding: '0 24px', display: 'flex', gap: 6, marginBottom: 14 }}>
        {['All', 'Present today', 'Reports due'].map((t,i) => (
          <span key={t} style={{
            fontSize: 12, fontWeight: 500, padding: '6px 12px', borderRadius: 999,
            background: i===0 ? 'var(--ink)' : 'var(--surface)',
            color: i===0 ? 'var(--surface)' : 'var(--ink-secondary)',
            border: i===0 ? '1px solid var(--ink)' : '1px solid var(--border)',
          }}>{t}</span>

            <Icon.Chevron size={16} />
          </div>
        ))}
      </div>
      <PhoneTabBar active="roster" />
    </div>
  );
}

/* ============================================================
   PHONE — Progress (matrix)
   ============================================================ */
function PhoneProgress() {
  const subtopics = [
    { name: 'Pink tower' }, { name: 'Brown stair' }, { name: 'Red rods' },
    { name: 'Cylinder blocks' }, { name: 'Binomial cube' }, { name: 'Trinomial cube' }, { name: 'Geometric solids' },
  ];
  const children = [
    { initials: 'AO', tone: 'clay',   row: ['m','m','p','m','p','i','-'] },
    { initials: 'BC', tone: 'sage',   row: ['m','p','p','i','-','-','-'] },
    { initials: 'DR', tone: 'butter', row: ['m','m','m','m','p','p','i'] },
    { initials: 'EO', tone: 'clay',   row: ['p','p','i','i','-','-','-'] },

            subtitle="14 of 18 present today · 1 absent · 3 unmarked"
            actions={<>
              <button style={{ ...iconBtn, width: 'auto', padding: '0 12px', gap: 6, fontSize: 12 }}>
                <Icon.Calendar size={14} /><span>This week</span>

              <button style={{ ...iconBtn, background: 'var(--terracotta)', color: 'var(--surface)', border: 0, gap: 6, padding: '0 14px', width: 'auto' }}>

              </button>

          <div style={{ padding: '14px 36px 0', display: 'flex', gap: 18, fontSize: 12, color: 'var(--ink-secondary)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>{cell('p')} <span>Present</span></div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>{cell('a')} <span>Absent</span></div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>{cell('t')} <span>Today (open)</span></div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>{cell('-')} <span>Unmarked</span></div>
          </div>
          <div style={{ padding: '14px 36px 60px' }}>
            <div style={cardStyle}>
              <div style={{ display: 'grid', gridTemplateColumns: `220px repeat(${days.length}, 1fr) 80px`, padding: '12px 20px', borderBottom: '1px solid var(--border)' }}>
                <div />
                {days.map(d => <div key={d} className="label-cap" style={{ color: 'var(--ink-muted)', textAlign: 'center' }}>{d}</div>)}
                <div className="label-cap" style={{ color: 'var(--ink-muted)', textAlign: 'right' }}>Present</div>
              </div>
              {children.map((c,i) => {
                const presentDays = c.row.filter(s => s === 'p' || s === 't').length;
                return (
                  <div key={i} style={{ display: 'grid', gridTemplateColumns: `220px repeat(${days.length}, 1fr) 80px`, alignItems: 'center', padding: '10px 20px', borderTop: '1px solid var(--border)' }}>

                      <Avatar initials={c.name.split(' ').map(w=>w[0]).join('')} tone={c.tone} size={28} />
                      <div style={{ fontSize: 13, color: 'var(--ink)', fontWeight: 500 }}>{c.name}</div>
                    </div>
                    {c.row.map((s,j) => <div key={j} style={{ display: 'flex', justifyContent: 'center' }}>{cell(s)}</div>)}
                    <div className="font-numeric" style={{ fontSize: 13, color: 'var(--ink-secondary)', textAlign: 'right' }}>{presentDays} / 5</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
      <ChatLauncher />
    </BrowserChrome>
  );
}
