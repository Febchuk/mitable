name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install
          # Ensure native binaries are present (npm optional deps bug workaround)
          npm ls @rollup/rollup-linux-x64-gnu 2>/dev/null || npm install @rollup/rollup-linux-x64-gnu --save-optional
          npm ls sharp 2>/dev/null || npm install --os=linux --cpu=x64 sharp

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run tests
        run: npm run test

      - name: Build all workspaces
        run: npm run build
