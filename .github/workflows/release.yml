name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  build-macos:
    name: Build macOS (arm64 + x64)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Build Electron app for macOS
        run: npm run build:mac --workspace=apps/electron
        env:
          # Apple code signing and notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: LUV3R68DAA
          # GitHub token for private repo access during build
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Code signing identity (stored in macOS keychain on runner)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Cloudflare R2 public URL for electron-builder generic provider
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: List build artifacts
        run: |
          echo "Listing files in output directory:"
          ls -la /tmp/mitable-dist/ || echo "Directory not found"

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: mitable-releases
          source-dir: /tmp/mitable-dist
          destination-dir: ./

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/mitable-dist/*.dmg
            /tmp/mitable-dist/*.zip
            /tmp/mitable-dist/latest-mac.yml
          draft: false
          prerelease: false
          generate_release_notes: true

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Build Electron app for Windows
        run: npm run build:win --workspace=apps/electron
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Cloudflare R2 public URL for electron-builder generic provider
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Find output directory
        id: find_output
        shell: bash
        run: |
          # Try common paths for electron-builder output on Windows
          if [ -d "/tmp/mitable-dist" ]; then
            echo "output_dir=/tmp/mitable-dist" >> $GITHUB_OUTPUT
          elif [ -d "C:/tmp/mitable-dist" ]; then
            echo "output_dir=C:/tmp/mitable-dist" >> $GITHUB_OUTPUT
          elif [ -d "$RUNNER_TEMP/mitable-dist" ]; then
            echo "output_dir=$RUNNER_TEMP/mitable-dist" >> $GITHUB_OUTPUT
          else
            echo "output_dir=apps/electron/dist" >> $GITHUB_OUTPUT
          fi
          echo "Found output directory: $(cat $GITHUB_OUTPUT)"

      - name: List build artifacts
        shell: bash
        run: |
          echo "Listing files in output directory:"
          ls -la "${{ steps.find_output.outputs.output_dir }}" || echo "Directory not found"

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: mitable-releases
          source-dir: ${{ steps.find_output.outputs.output_dir }}
          destination-dir: ./

      - name: Append to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find_output.outputs.output_dir }}/*.exe
            ${{ steps.find_output.outputs.output_dir }}/latest.yml
          draft: false
          prerelease: false
