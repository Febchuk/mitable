<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1A1916" />
    <title>Offline · Mitable</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #1A1916;
        color: #ECE8E0;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      }
      main {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px;
        text-align: center;
        gap: 16px;
      }
      h1 { font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
      p { font-size: 14px; line-height: 1.5; margin: 0; max-width: 320px; color: #9B9689; }
      button {
        margin-top: 8px;
        padding: 10px 18px;
        border-radius: 999px;
        border: 1px solid rgba(236, 232, 224, 0.16);
        background: rgba(236, 232, 224, 0.06);
        color: #ECE8E0;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover { background: rgba(236, 232, 224, 0.1); }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>Captures you make right now are saved on this device and will sync as soon as you're back online.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
