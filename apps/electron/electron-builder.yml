appId: com.mitable.app
productName: Mitable
copyright: Copyright © 2025 Mitable
directories:
  buildResources: build
  output: dist

# macOS Configuration
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  icon: build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: "Febe Chukwuma (LUV3R68DAA)"
  notarize: false

# Clean extended attributes before signing (required for macOS code signing)
afterPack: scripts/afterPack.cjs

# Notarization (runs after signing)
afterSign: scripts/notarize.cjs

# DMG Configuration
dmg:
  title: "${productName} ${version}"
  icon: build/icon.png
  iconSize: 100
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

# Windows Configuration
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  # Disable code signing for dev builds (enable for production)
  sign: null
  certificateSubjectName: null

# NSIS Installer Configuration
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Mitable

# Extra resources (copied to app resources folder for runtime access)
extraResources:
  - from: "build/icon.png"
    to: "assets/icon.png"

# File associations and metadata
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.editorconfig,.gitattributes,.gitignore,.yarnrc.yml,.travis.yml,appveyor.yml,circle.yml}"
  - "!{npm-debug.log,yarn.lock,.npmrc,yarn-error.log}"

# Unpack native modules from ASAR (required for native bindings to work)
asarUnpack:
  - "node_modules/get-windows/**/*"
  - "node_modules/active-win/**/*"
  - "node_modules/msgpackr-extract/**/*"

# Build artifact configuration
artifactName: "${productName}-${version}-${arch}.${ext}"
