appId: com.mitable.app
productName: Mitable
copyright: Copyright © 2025 Mitable
directories:
  buildResources: build
  output: /tmp/mitable-dist

# Publish configuration for auto-updates
publish:
  provider: github
  owner: Febchuk
  repo: mitable
  releaseType: release
  private: true
  token: ${env.GH_TOKEN}

# macOS Configuration
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  icon: build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: "Febe Chukwuma (LUV3R68DAA)"
  notarize:
    teamId: LUV3R68DAA

# DMG Configuration
dmg:
  sign: true
  title: "${productName} ${version}"
  icon: build/icon.png
  iconSize: 100
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

# Windows Configuration
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  # Disable code signing for dev builds (enable for production)
  sign: null
  certificateSubjectName: null

# NSIS Installer Configuration
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Mitable

# Extra resources (copied to app resources folder for runtime access)
extraResources:
  - from: "build/icon.png"
    to: "assets/icon.png"

# Files to include (electron-vite bundles everything to out/)
files:
  - "out/**/*"
  - "package.json"
  # Native modules required at runtime
  - "node_modules/get-windows/**/*"
  - "node_modules/active-win/**/*"
  - "node_modules/msgpackr-extract/**/*"
  - "node_modules/electron-log/**/*"
  # Exclude everything else
  - "!src"
  - "!**/*.{ts,tsx,map}"
  - "!**/.vscode"
  - "!**/electron.vite.config.*"
  - "!**/*.md"
  - "!**/.*"

# Unpack native modules from ASAR (required for native bindings to work)
asarUnpack:
  - "node_modules/get-windows/**/*"
  - "node_modules/active-win/**/*"
  - "node_modules/msgpackr-extract/**/*"

# Build artifact configuration
artifactName: "${productName}-${version}-${arch}.${ext}"
