<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mitable Montessori — Child Detail · Ada Chen</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Caveat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

    <style>
      :root {
        /* Warm — verbatim from globals.css */
        --color-canvas: #faf6ee;
        --color-surface: #fffbf3;
        --color-muted: #f2ede0;
        --color-ink: #2a2723;
        --color-ink-secondary: #5c544a;
        --color-ink-muted: #9c9285;
        --color-border: #e0d8c8;
        --color-border-strong: #b89880;
        --color-terracotta: #c46a4f;
        --color-terracotta-soft: #f4ddd2;
        --color-terracotta-deep: #a24a3d;
        --color-sage: #7a9b7a;
        --color-sage-soft: #dde7da;
        --color-sage-deep: #3f5c40;
        --color-butter: #e8c56a;
        --color-butter-soft: #f6e8b8;
        --color-butter-deep: #7a5c0f;
        --color-dusty-blue: #6b8aa6;
        --color-dusty-blue-soft: #d2dce5;
        --color-clay: #b89880;
        --color-clay-soft: #e5d8c8;

        --font-sans: "DM Sans", ui-sans-serif, system-ui, sans-serif;
        --font-display: "Caveat", ui-serif, serif;
      }

      /* Quiet variant — same structure, lower-saturation siblings.
         All values pulled toward neutrals; preserves hue identity for legibility. */
      [data-variant="quiet"] {
        --color-canvas: #f6f3ec;
        --color-surface: #fbf8f1;
        --color-muted: #ece7da;
        --color-border: #d9d2c2;
        --color-terracotta: #b8755f;
        --color-terracotta-soft: #ecdbd1;
        --color-terracotta-deep: #8e574a;
        --color-sage: #8a9e8a;
        --color-sage-soft: #dee5db;
        --color-sage-deep: #4f6850;
        --color-butter: #d9bd78;
        --color-butter-soft: #ece1bf;
        --color-butter-deep: #7a6627;
        --color-dusty-blue: #7e93a6;
        --color-dusty-blue-soft: #d4dbe2;
        --color-clay: #b09783;
        --color-clay-soft: #e0d6c8;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        background: var(--color-canvas);
        color: var(--color-ink);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        font-size: 14px;
        line-height: 1.4;
      }

      /* paper-feel noise wash, identical recipe to globals.css */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.035;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.15 0 0 0 0 0.13 0 0 0 0 0.5 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      }

      .label-cap {
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: 11px;
        font-weight: 500;
      }
      .font-display {
        font-family: var(--font-display);
        font-weight: 500;
      }
      .font-numeric {
        font-variant-numeric: tabular-nums;
      }

      button {
        font-family: inherit;
        cursor: pointer;
      }

      .tap {
        transition:
          transform 120ms ease,
          background 120ms ease,
          opacity 120ms ease,
          box-shadow 160ms ease,
          border-color 120ms ease;
      }
      .tap:active {
        transform: scale(0.97);
      }

      .scroll-quiet::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .scroll-quiet::-webkit-scrollbar-thumb {
        background: var(--color-clay-soft);
        border-radius: 999px;
      }
      .scroll-quiet::-webkit-scrollbar-track {
        background: transparent;
      }

      /* Used by Topics/Subtopics — affords horizontal scroll without
         showing a scrollbar (the chips themselves cue overflow). */
      .scroll-hidden {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .scroll-hidden::-webkit-scrollbar {
        display: none;
      }

      @keyframes slide-up {
        from {
          transform: translateY(8px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes pulse-ring {
        0% {
          box-shadow: 0 0 0 0 rgba(122, 155, 122, 0.5);
        }
        70% {
          box-shadow: 0 0 0 8px rgba(122, 155, 122, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(122, 155, 122, 0);
        }
      }
      .anim-slide-up {
        animation: slide-up 220ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }
      .anim-fade-in {
        animation: fade-in 180ms ease both;
      }
      .pulse-ring {
        animation: pulse-ring 2.2s infinite;
      }

      /* shell — the entire page lives inside a tab pane */
      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: color-mix(in srgb, var(--color-canvas) 92%, transparent);
        backdrop-filter: saturate(140%) blur(8px);
        border-bottom: 1px solid var(--color-border);
      }
      .topbar-inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 10px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 14px;
        color: var(--color-ink);
      }
      .brand-mark {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: var(--color-ink);
        color: var(--color-surface);
        display: grid;
        place-items: center;
        font-family: var(--font-display);
        font-size: 18px;
        line-height: 1;
        padding-bottom: 2px;
      }

      .tabs {
        display: inline-flex;
        gap: 0;
        background: var(--color-muted);
        padding: 3px;
        border-radius: 999px;
      }
      .tab {
        font-size: 12px;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 999px;
        background: transparent;
        color: var(--color-ink-secondary);
        border: 0;
      }
      .tab[data-active="true"] {
        background: var(--color-surface);
        color: var(--color-ink);
        box-shadow: 0 1px 2px rgba(42, 39, 35, 0.06);
      }

      .variant-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 11.5px;
        color: var(--color-ink-secondary);
      }
      .variant-toggle .label-cap {
        color: var(--color-ink-muted);
      }
      .variant-pills {
        display: inline-flex;
        background: var(--color-muted);
        border-radius: 999px;
        padding: 3px;
      }
      .variant-pill {
        font-size: 11px;
        font-weight: 500;
        padding: 5px 11px;
        border-radius: 999px;
        background: transparent;
        color: var(--color-ink-secondary);
        border: 0;
      }
      .variant-pill[data-active="true"] {
        background: var(--color-surface);
        color: var(--color-ink);
        box-shadow: 0 1px 2px rgba(42, 39, 35, 0.06);
      }

      /* ---------- viewport frames ---------- */
      .viewport-web,
      .viewport-mobile {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px;
      }
      .viewport-web .frame {
        background: var(--color-canvas);
        border: 1px solid var(--color-border);
        border-radius: 16px;
        overflow: hidden;
      }
      .viewport-mobile {
        display: flex;
        justify-content: center;
      }
      .phone {
        width: 390px;
        height: 844px;
        background: var(--color-canvas);
        border: 8px solid #1c1a17;
        border-radius: 44px;
        box-shadow:
          0 30px 80px rgba(42, 39, 35, 0.18),
          0 8px 24px rgba(42, 39, 35, 0.08);
        overflow: hidden;
        position: relative;
      }
      .phone-content {
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
      }
      .phone-notch {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 110px;
        height: 28px;
        background: #1c1a17;
        border-radius: 999px;
        z-index: 60;
      }

      /* ---------- card primitives ---------- */
      .card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 14px;
      }
      .card-pad-lg {
        padding: 22px 24px;
      }
      .card-pad-md {
        padding: 18px 20px;
      }
      .card-pad-sm {
        padding: 14px 16px;
      }

      /* ---------- spider ---------- */
      .spider-card {
        position: relative;
      }
      .spider-axis-label {
        font-size: 11.5px;
        font-weight: 500;
        fill: var(--color-ink-secondary);
        font-family: var(--font-sans);
      }
      .spider-axis-label-active {
        fill: var(--color-ink);
        font-weight: 600;
      }
      .spider-popover {
        position: absolute;
        z-index: 30;
        background: var(--color-ink);
        color: var(--color-surface);
        padding: 12px 14px;
        border-radius: 12px;
        font-size: 12.5px;
        line-height: 1.45;
        box-shadow:
          0 18px 40px rgba(42, 39, 35, 0.22),
          0 6px 14px rgba(42, 39, 35, 0.12);
        max-width: 240px;
        pointer-events: none;
      }
      .spider-popover .label-cap {
        color: rgba(255, 251, 243, 0.55);
        margin-bottom: 4px;
        display: block;
      }
      .spider-popover-arrow {
        position: absolute;
        width: 8px;
        height: 8px;
        background: var(--color-ink);
        transform: rotate(45deg);
      }

      .spider-legend {
        display: inline-flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .legend-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--color-ink-secondary);
      }
      .legend-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
      }

      /* ---------- timeline ---------- */
      .timeline-rail {
        position: relative;
      }
      .timeline-rail::before {
        content: "";
        position: absolute;
        left: 11px;
        top: 12px;
        bottom: 12px;
        width: 1px;
        background: var(--color-border);
      }
      .timeline-row {
        display: grid;
        grid-template-columns: 24px 1fr auto;
        gap: 14px;
        align-items: flex-start;
        padding: 12px 0;
        border-bottom: 1px solid var(--color-border);
      }
      .timeline-row:last-child {
        border-bottom: 0;
      }
      .timeline-dot-wrap {
        position: relative;
        height: 22px;
        width: 24px;
        display: grid;
        place-items: center;
      }
      .timeline-dot {
        width: 11px;
        height: 11px;
        border-radius: 999px;
        border: 2px solid var(--color-surface);
        box-shadow: 0 0 0 1px var(--color-border);
        z-index: 1;
        position: relative;
      }

      /* ---------- step diagram ---------- */
      .step-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 14px;
        border-radius: 999px;
        border: 1.5px solid var(--color-border);
        background: var(--color-surface);
        font-size: 12.5px;
        font-weight: 500;
        color: var(--color-ink-muted);
        white-space: nowrap;
        transition:
          background 200ms ease,
          color 200ms ease,
          border-color 200ms ease,
          transform 200ms ease;
      }
      .step-pill[data-state="filled-i"] {
        background: var(--color-terracotta-soft);
        color: var(--color-terracotta-deep);
        border-color: var(--color-terracotta);
      }
      .step-pill[data-state="filled-p"] {
        background: var(--color-butter-soft);
        color: var(--color-butter-deep);
        border-color: var(--color-butter);
      }
      .step-pill[data-state="filled-m"] {
        background: var(--color-sage-soft);
        color: var(--color-sage-deep);
        border-color: var(--color-sage);
      }
      .step-pill[data-current="true"] {
        transform: scale(1.06);
      }
      .step-pill[data-current="true"][data-state="filled-m"] {
        animation: pulse-ring 2.4s infinite;
      }

      .step-track {
        flex: 1;
        height: 2px;
        background: var(--color-border);
        border-radius: 999px;
        position: relative;
      }
      .step-track[data-filled="true"] {
        background: linear-gradient(
          90deg,
          var(--color-terracotta) 0%,
          var(--color-butter) 50%,
          var(--color-border) 50%
        );
      }
      .step-track[data-filled="full"] {
        background: linear-gradient(
          90deg,
          var(--color-terracotta) 0%,
          var(--color-butter) 50%,
          var(--color-sage) 100%
        );
      }
      .step-date {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: var(--color-ink-muted);
        white-space: nowrap;
      }

      /* ---------- subtopic chip strip ---------- */
      .subtopic-strip {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 4px 0 8px;
        scroll-snap-type: x proximity;
      }
      .subtopic-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 13px;
        border-radius: 999px;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        font-size: 12.5px;
        font-weight: 500;
        color: var(--color-ink-secondary);
        white-space: nowrap;
        scroll-snap-align: start;
        flex-shrink: 0;
      }
      .subtopic-chip[data-active="true"] {
        background: var(--color-ink);
        color: var(--color-surface);
        border-color: var(--color-ink);
      }
      .subtopic-chip-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
      }

      /* ---------- filter chips on timeline ---------- */
      .filter-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }
      .filter-chip {
        font-size: 12px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--color-surface);
        color: var(--color-ink-secondary);
        border: 1px solid var(--color-border);
      }
      .filter-chip[data-active="true"] {
        background: var(--color-ink);
        color: var(--color-surface);
        border-color: var(--color-ink);
      }

      /* ---------- bottom sheet (mobile) ---------- */
      .sheet-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(42, 39, 35, 0.32);
        z-index: 70;
        animation: fade-in 160ms ease both;
      }
      .sheet {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--color-surface);
        border-top-left-radius: 22px;
        border-top-right-radius: 22px;
        padding: 18px 20px 28px;
        box-shadow: 0 -10px 30px rgba(42, 39, 35, 0.22);
        animation: slide-up 240ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
        z-index: 71;
      }
      .sheet-grip {
        width: 36px;
        height: 4px;
        background: var(--color-border-strong);
        border-radius: 999px;
        margin: 0 auto 14px;
        opacity: 0.55;
      }

      .ghost-btn {
        background: transparent;
        border: 1px solid var(--color-border);
        color: var(--color-ink);
        padding: 7px 12px;
        border-radius: 10px;
        font-size: 12.5px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .ghost-btn:hover {
        background: var(--color-muted);
      }
      .primary-btn {
        background: var(--color-ink);
        color: var(--color-surface);
        border: 1px solid var(--color-ink);
        padding: 7px 12px;
        border-radius: 10px;
        font-size: 12.5px;
        font-weight: 500;
      }

      /* ---------- helpers ---------- */
      .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
        color: var(--color-ink-muted);
      }
      .meta-row > span {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }
      .meta-row .dot-sep {
        width: 3px;
        height: 3px;
        border-radius: 999px;
        background: var(--color-border-strong);
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
/* ---------------------------------------------------------------- */
/*  Data — Ada Chen, 14 timeline entries, real subtopics             */
/* ---------------------------------------------------------------- */

const AREAS = {

/* ---------------------------------------------------------------- */
/*  Spider                                                           */
/* ---------------------------------------------------------------- */

function Spider({ axes, size = 360, onAxisHover, hoveredKey, mobile }) {
  const cx = size / 2;
  const cy = size / 2;
  // leave generous room for axis labels — Material Progression / Self-Correction
  // are long; they need horizontal breathing room
  const labelPad = mobile ? 64 : 92;
  const r = (size / 2) - labelPad;
  const rings = 4;

  const angleFor = (i) => -Math.PI / 2 + (i * 2 * Math.PI) / axes.length;

  const polygonPoints = axes
    .map((a, i) => {
      const lvlIdx = LEVELS.indexOf(a.level) + 1; // 1..4
      const radius = (r * lvlIdx) / rings;
      const ang = angleFor(i);
      return [cx + radius * Math.cos(ang), cy + radius * Math.sin(ang)];
    });

  const polyStr = polygonPoints.map((p) => p.join(",")).join(" ");

  // ring polygons
  const ringPolys = [];
  for (let lvl = 1; lvl <= rings; lvl++) {
    const pts = axes
      .map((_, i) => {
        const ang = angleFor(i);
        const radius = (r * lvl) / rings;
        return `${cx + radius * Math.cos(ang)},${cy + radius * Math.sin(ang)}`;
      })
      .join(" ");
    ringPolys.push(pts);
  }

  return (
    <svg
      viewBox={`0 0 ${size} ${size}`}
      width="100%"
      height="100%"
      style={{ display: "block", overflow: "visible" }}
      role="img"
      aria-label="7-axis whole-child assessment spider chart"
    >
      {/* concentric rings — neutral, no rainbow */}
      {ringPolys.map((pts, i) => (
        <polygon
          key={i}
          points={pts}
          fill="none"
          stroke="var(--color-border)"
          strokeWidth={i === ringPolys.length - 1 ? 1.2 : 1}
          strokeDasharray={i === ringPolys.length - 1 ? "none" : "2 4"}
          opacity={i === ringPolys.length - 1 ? 0.85 : 0.55}
        />
      ))}

      {/* axis spokes */}
      {axes.map((a, i) => {
        const ang = angleFor(i);
        return (
          <line
            key={a.key}
            x1={cx}
            y1={cy}
            x2={cx + r * Math.cos(ang)}
            y2={cy + r * Math.sin(ang)}
            stroke="var(--color-border)"
            strokeWidth={1}
            opacity={0.7}
          />
        );
      })}

      {/* filled polygon */}
      <polygon
        points={polyStr}
        fill="var(--color-sage)"
        fillOpacity={0.18}
        stroke="var(--color-sage-deep)"
        strokeWidth={1.5}
        strokeLinejoin="round"
      />

      {/* vertices */}
      {polygonPoints.map(([x, y], i) => {
        const isHovered = hoveredKey === axes[i].key;
        return (
          <circle
            key={i}
            cx={x}
            cy={y}
            r={isHovered ? 5.5 : 3.5}
            fill="var(--color-surface)"
            stroke="var(--color-sage-deep)"
            strokeWidth={1.6}
            style={{ transition: "r 160ms ease" }}
          />
        );
      })}

      {/* axis labels + hover hit areas */}
      {axes.map((a, i) => {
        const ang = angleFor(i);
        const lx = cx + (r + (mobile ? 16 : 24)) * Math.cos(ang);
        const ly = cy + (r + (mobile ? 16 : 24)) * Math.sin(ang);
        const isActive = hoveredKey === a.key;

        // text-anchor based on x position
        let anchor = "middle";
        if (lx < cx - 8) anchor = "end";
        else if (lx > cx + 8) anchor = "start";

        // 2-line wrap for long axis labels — split on space first; if no space (e.g. "Self-Correction"),
        // split on hyphen and re-add it to the first part so "Self-" / "Correction" reads naturally.
        const spaceParts = a.label.split(" ");
        let wrapParts = null;
        if (spaceParts.length > 1 && a.label.length > 12) {
          wrapParts = [spaceParts[0], spaceParts.slice(1).join(" ")];
        } else if (a.label.includes("-") && a.label.length > 13) {
          const idx = a.label.indexOf("-");
          wrapParts = [a.label.slice(0, idx + 1), a.label.slice(idx + 1)];
        }
        const wrap = !!wrapParts;
        const dy1 = wrap ? -5 : 4;

        return (
          <g
            key={a.key}
            style={{ cursor: "pointer" }}
            onClick={(e) => {
              e.stopPropagation();
              onAxisHover(a.key);
            }}
          >
            {/* invisible hit slice from center to label */}
            <line
              x1={cx}
              y1={cy}
              x2={lx}
              y2={ly}
              stroke="transparent"
              strokeWidth={mobile ? 32 : 44}
            />
            {wrap ? (
              <text
                x={lx}
                y={ly}
                textAnchor={anchor}
                className={isActive ? "spider-axis-label spider-axis-label-active" : "spider-axis-label"}
              >
                <tspan x={lx} dy={dy1}>{wrapParts[0]}</tspan>
                <tspan x={lx} dy="13">{wrapParts[1]}</tspan>
              </text>
            ) : (
              <text
                x={lx}
                y={ly + 4}
                textAnchor={anchor}
                className={isActive ? "spider-axis-label spider-axis-label-active" : "spider-axis-label"}
              >
                {a.label}
              </text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

function AxisDescriptorPopover({ axis, anchorRect, containerRect, mobile, onClose }) {
  if (!axis) return null;
  if (mobile) {
    return (
      <React.Fragment>
        <div className="sheet-backdrop" onClick={onClose} />
        <div className="sheet">
          <div className="sheet-grip" />
          <div className="label-cap" style={{ color: "var(--color-ink-muted)", marginBottom: 8 }}>
            {axis.label}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {LEVELS.map((lvl) => {
              const isCurrent = lvl === axis.level;
              return (
                <div
                  key={lvl}
                  style={{
                    display: "grid",
                    gridTemplateColumns: "94px 1fr",
                    gap: 12,
                    alignItems: "flex-start",
                    padding: "10px 12px",
                    borderRadius: 10,
                    background: isCurrent ? LEVEL_TONES[lvl].soft : "transparent",
                    border: isCurrent ? `1px solid ${LEVEL_TONES[lvl].tone}` : "1px solid transparent",
                  }}
                >
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span
                      className="legend-dot"
                      style={{ background: LEVEL_TONES[lvl].tone, width: 9, height: 9 }}
                    />
                    <span
                      style={{
                        fontSize: 12,
                        fontWeight: isCurrent ? 600 : 500,
                        color: isCurrent ? LEVEL_TONES[lvl].deep : "var(--color-ink-secondary)",
                      }}
                    >
                      {lvl}
                    </span>
                  </div>
                  <div
                    style={{
                      fontSize: 13,
                      color: isCurrent ? "var(--color-ink)" : "var(--color-ink-secondary)",
                      lineHeight: 1.45,
                    }}
                  >
                    {axis.descriptors[lvl]}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ marginTop: 14, fontSize: 11.5, color: "var(--color-ink-muted)" }}>
            Last updated {axis.updated}
          </div>
        </div>
      </React.Fragment>
    );
  }

  // Desktop popover
  if (!anchorRect || !containerRect) return null;
  const left = anchorRect.left - containerRect.left + anchorRect.width / 2;
  const top = anchorRect.top - containerRect.top + anchorRect.height / 2;

  return (
    <div
      className="spider-popover anim-fade-in"
      style={{ left, top, transform: "translate(-50%, -120%)" }}
    >
      <span className="label-cap">{axis.label} · {axis.level}</span>
      <div>{axis.descriptors[axis.level]}</div>
      <div style={{ marginTop: 6, opacity: 0.55, fontSize: 11 }}>
        Last updated {axis.updated}
      </div>
    </div>
  );
}

  );
}

function StepDiagramHorizontal({ labels, filledClass, currentIdx }) {
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        {labels.map((l, i) => {
          const isFilled = i <= currentIdx;
          const stateAttr = isFilled ? `filled-${l.key}` : "";
          return (
            <React.Fragment key={l.key}>
              <span
                className="step-pill"
                data-state={stateAttr}
                data-current={i === currentIdx}
              >
                <span
                  className="legend-dot"
                  style={{
                    background: isFilled ? stateMeta[l.key].tone : "var(--color-border-strong)",
                    opacity: isFilled ? 1 : 0.5,
                  }}
                />
                {l.label}
              </span>
              {i < labels.length - 1 && (
                <div style={{ flex: 1, position: "relative", height: 24 }}>
                  <div
                    className="step-track"
                    data-filled={
                      i < currentIdx ? "full" : i === currentIdx ? "true" : "false"
                    }
                    style={{ position: "absolute", top: 11, left: 0, right: 0 }}
                  />
                  <span className="step-date">{labels[i + 1].date || "—"}</span>
                </div>
              )}
            </React.Fragment>
          );
        })}
      </div>
      <div
        style={{
          marginTop: 28,
          display: "flex",
          justifyContent: "space-between",
          fontSize: 11,
          color: "var(--color-ink-muted)",
        }}
      >
        <span>Started {labels[0].date || "—"}</span>
        <span>{currentIdx === 2 ? "Mastered" : `Next: ${labels[currentIdx + 1]?.label || "—"}`}</span>
      </div>
    </div>
  );
}

function StepDiagramVertical({ labels, filledClass, currentIdx }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      {labels.map((l, i) => {
        const isFilled = i <= currentIdx;
        const stateAttr = isFilled ? `filled-${l.key}` : "";
        return (
          <React.Fragment key={l.key}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span
                className="step-pill"
                data-state={stateAttr}
                data-current={i === currentIdx}
                style={{ minWidth: 134 }}
              >
                <span
                  className="legend-dot"
                  style={{
                    background: isFilled ? stateMeta[l.key].tone : "var(--color-border-strong)",
                    opacity: isFilled ? 1 : 0.5,
                  }}
                />
                {l.label}
              </span>
              <span
                className="font-numeric"
                style={{ fontSize: 12, color: "var(--color-ink-muted)" }}
              >
                {l.date || "—"}
              </span>
            </div>
            {i < labels.length - 1 && (
              <div
                style={{
                  marginLeft: 18,
                  height: 18,
                  width: 2,
                  background:
                    i < currentIdx
                      ? stateMeta[l.key].tone
                      : "var(--color-border)",
                  opacity: i < currentIdx ? 0.7 : 1,
                }}
              />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function GuardianChip() {
  // Render "Jane & Wei Chen" if guardians share a last name; otherwise full names.
  const gs = CHILD_PROFILE.guardians;
  const lasts = gs.map((g) => g.name.split(" ").slice(-1)[0]);
  const sameLast = lasts.every((l) => l === lasts[0]);
  const names = sameLast
    ? gs.map((g) => g.name.split(" ")[0]).join(" & ") + " " + lasts[0]
    : gs.map((g) => g.name).join(" & ");
  return (
    <span
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 6,
        padding: "2px 9px",
        borderRadius: 999,
        background: "transparent",

      <span style={{ fontWeight: 500 }}>{names}</span>
    </span>
  );
}

function SpiderModal({ open, onClose, mobile, selectedAxis, onSelectAxis }) {
  React.useEffect(() => {

    const onKey = (e) => { if (e.key === "Escape") onClose(); };

    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);

  if (!open) return null;

  return (
    <div
      className="anim-fade-in"
      style={{
        position: "absolute",
        inset: 0,
        background: "rgba(42, 39, 35, 0.42)",

        justifyContent: "center",
      }}

        style={{
          background: "var(--color-surface)",
          borderRadius: mobile ? 0 : 18,

          maxHeight: mobile ? "100%" : "92%",

              borderRadius: 10,

function AxisDescriptorInline({ axisKey }) {
  const axis = AXES.find((a) => a.key === axisKey);

    <div
      key={axisKey}

      style={{
        marginTop: 14,
        padding: "12px 14px",

                }}
              >
                <LevelTransitionBadge from={o.from} to={o.to} />
                <span style={{ fontSize: 11, color: "var(--color-ink-muted)" }}>
                  {o.author}
                </span>
              </div>
            </div>
          );
        })}
      </div>

      {shown < source.length && (
        <button
          type="button"
          className="tap"
          onClick={() => setShown((n) => Math.min(source.length, n + pageSize))}
          style={{
            padding: "10px 14px",
            background: "var(--color-canvas)",
            border: "1px solid var(--color-border)",
            borderRadius: 10,
            fontSize: 13,
            fontWeight: 500,
            color: "var(--color-ink-secondary)",
          }}
        >
          Load {Math.min(pageSize, source.length - shown)} more
        </button>
      )}
      {source.length === 0 && (
        <div
          style={{
            padding: "20px 0",
            fontSize: 13,
            color: "var(--color-ink-muted)",
            fontStyle: "italic",
            textAlign: "center",
          }}
        >
          No notes for {axis?.label || "this axis"} yet.
        </div>
      )}
    </div>
  );
}

  return (
    <React.Fragment>

        title="Seven dimensions"
        accent={mobile ? "how Ada is becoming" : "how Ada is becoming herself"}
        mobile={mobile}
      />

      <div style={{ padding: mobile ? "8px 16px 36px" : "10px 28px 60px" }}>
        {mobile ? (
          <React.Fragment>
            <div className="card" style={{ padding: 16 }}>
              <SpiderHeroCard
                mobile={true}
                size={300}
                selectedAxis={selectedAxis}
                onSelectAxis={setSelectedAxis}
                onExpand={() => setModalOpen(true)}
              />

            <div className="card" style={{ padding: 16, marginTop: 14 }}>
              <WholeChildObservations
                mobile={true}
                selectedAxis={selectedAxis}
                onClearAxis={() => setSelectedAxis(null)}
              />
            </div>
          </React.Fragment>
        ) : (
          <div
            className="card"
            style={{
              padding: 22,
              display: "grid",

              alignItems: "stretch",

          >
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                justifyContent: "center",
                position: "relative",
              }}
            >

                mobile={false}
                size={520}
                selectedAxis={selectedAxis}
                onSelectAxis={setSelectedAxis}
                onExpand={() => setModalOpen(true)}

            <div
              style={{
                borderLeft: "1px solid var(--color-border)",
                paddingLeft: 28,
                minWidth: 0,

}

/* ---------------------------------------------------------------- */
/*  Curriculum view — area → subtopic → detail                        */
/* ---------------------------------------------------------------- */

const AREA_LIST = ["Sensorial", "Math", "Language", "Practical Life", "Cultural"];

function areaProgress(area) {
  const subs = SUBTOPICS.filter((s) => s.area === area);
  const total = subs.length;
  const mastered = subs.filter((s) => s.state === "m").length;
  return { total, mastered, subs };
}

function TopicPicker({ value, onChange, mobile }) {
  // mobile: single-row horizontal scroll-snap (matches subtopic-strip pattern)
  // web: wrap allowed
  const containerStyle = mobile
    ? null
    : { display: "flex", gap: 8, flexWrap: "wrap" };

  const list = AREA_LIST.filter((area) => SUBTOPICS.some((s) => s.area === area));

  const inner = list.map((area) => {
    const active = value === area;
    return (
      <button
        key={area}
        type="button"
        className={mobile ? "subtopic-chip tap" : "tap"}
        data-active={mobile ? active : undefined}
        onClick={() => onChange(area)}
        style={
          mobile
            ? undefined
            : {
                padding: "9px 16px",
                borderRadius: 999,
                background: active ? "var(--color-ink)" : "var(--color-surface)",
                color: active ? "var(--color-surface)" : "var(--color-ink)",
                border: active ? "1px solid var(--color-ink)" : "1px solid var(--color-border)",
                fontSize: 13,
                fontWeight: 500,
                whiteSpace: "nowrap",
              }
        }
      >
        {area}
      </button>
    );
  });

  if (mobile) {
    return (
      <div className="subtopic-strip scroll-hidden" style={{ paddingBottom: 4 }}>
        {inner}
      </div>
    );
  }
  return <div style={containerStyle}>{inner}</div>;
}

function SubtopicPicker({ area, value, onChange, mobile }) {
  const subs = SUBTOPICS.filter((s) => s.area === area);

  const inner = subs.map((s) => {
    const active = value === s.name;
    return (
      <button
        key={s.name}
        type="button"
        className="subtopic-chip tap"
        data-active={active}
        onClick={() => onChange(s.name)}
      >
        {s.name}
      </button>
    );
  });

  if (mobile) {
    return (
      <div className="subtopic-strip scroll-hidden" style={{ paddingBottom: 4 }}>
        {inner}
      </div>
    );
  }
  return <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>{inner}</div>;
}

function SubtopicDetail({ subtopicName, mobile }) {
  const sub = SUBTOPICS.find((s) => s.name === subtopicName);
  const meta = stateMeta[sub.state];
  const all = TIMELINE.filter((t) => t.material === sub.name);
  const initial = 5;
  const [shown, setShown] = React.useState(initial);
  React.useEffect(() => { setShown(initial); }, [subtopicName]);
  const rows = all.slice(0, shown);

  const stateOrder = ["i", "p", "m"];
  const currentIdx = stateOrder.indexOf(sub.state);
  const stepLabels = [
    { key: "i", label: "Introduced", date: sub.introduced },
    { key: "p", label: "Practicing", date: sub.practicing },
    { key: "m", label: "Mastered", date: sub.mastered },
  ];

  return (
    <div
      key={subtopicName}
      className="anim-slide-up"
      style={{
        marginTop: 18,
        padding: mobile ? "16px" : "18px 20px",
        background: "var(--color-canvas)",
        border: "1px solid var(--color-border)",
        borderRadius: 12,
      }}
    >
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          alignItems: "flex-end",
          flexWrap: "wrap",
          gap: 8,
          marginBottom: mobile ? 18 : 22,
        }}
      >
        <div>
          <div
            style={{
              fontSize: 18,
              fontWeight: 600,
              color: "var(--color-ink)",
              lineHeight: 1.15,
            }}
          >
            {sub.name}
          </div>
          <div
            style={{
              fontSize: 12,
              color: "var(--color-ink-muted)",
              marginTop: 4,
              display: "flex",
              gap: 8,
              alignItems: "center",
            }}
          >
            <span
              className="legend-dot"
              style={{ width: 7, height: 7, background: AREAS[sub.area].tone }}
            />
            {sub.area}
          </div>
        </div>
      </div>

      {mobile ? (
        <StepDiagramVertical labels={stepLabels} filledClass={() => ""} currentIdx={currentIdx} />
      ) : (
        <StepDiagramHorizontal labels={stepLabels} filledClass={() => ""} currentIdx={currentIdx} />
      )}

      <div style={{ marginTop: 24 }}>
        <div className="label-cap" style={{ color: "var(--color-ink-muted)", marginBottom: 10 }}>
          Activities for {sub.name}
        </div>
        {all.length === 0 && (
          <div
            style={{
              fontSize: 12.5,
              color: "var(--color-ink-muted)",
              fontStyle: "italic",
              padding: "10px 0",
            }}
          >
            No observations yet for this subtopic.
          </div>
        )}
        {rows.map((row, i) => (
          <div
            key={row.id}
            style={{
              display: "grid",
              gridTemplateColumns: mobile ? "auto 1fr" : "70px 1fr auto",
              gap: 12,
              padding: "10px 0",
              borderTop: i ? "1px solid var(--color-border)" : "0",
              alignItems: "flex-start",
            }}
          >
            <div
              className="font-numeric"
              style={{
                fontSize: 12,
                color: "var(--color-ink-muted)",
                minWidth: mobile ? 56 : "auto",
              }}
            >
              {row.date}
            </div>
            <div
              style={{
                fontSize: 13,
                color: "var(--color-ink-secondary)",
                lineHeight: 1.45,
              }}
            >
              {row.comment}
              {row.transition && (
                <span
                  style={{
                    display: "inline-block",
                    marginLeft: mobile ? 0 : 8,
                    marginTop: mobile ? 6 : 0,
                    fontSize: 10.5,
                    fontWeight: 500,
                    letterSpacing: "0.04em",
                    textTransform: "uppercase",
                    padding: "3px 8px",
                    borderRadius: 999,
                    color: stateMeta[row.transition.to.toLowerCase()[0]].deep,
                    background: stateMeta[row.transition.to.toLowerCase()[0]].soft,
                    border: `1px solid ${stateMeta[row.transition.to.toLowerCase()[0]].tone}`,
                  }}
                >
                  → {row.transition.to}
                </span>
              )}
            </div>
            {!mobile && (
              <div
                className="font-numeric"
                style={{
                  fontSize: 11.5,
                  color: "var(--color-ink-muted)",
                  whiteSpace: "nowrap",
                }}
              >
                {row.rel}
              </div>
            )}
          </div>
        ))}

        {shown < all.length && (
          <button
            type="button"
            className="tap"
            onClick={() => setShown((n) => Math.min(all.length, n + initial))}
            style={{
              marginTop: 12,
              width: "100%",
              padding: "9px 14px",
              background: "var(--color-surface)",
              border: "1px solid var(--color-border)",
              borderRadius: 10,
              fontSize: 12.5,
              fontWeight: 500,
              color: "var(--color-ink-secondary)",
            }}
          >
            Load {Math.min(initial, all.length - shown)} more
          </button>
        )}
      </div>
    </div>
  );
}

function CurriculumView({ mobile }) {
  // Default area = the one that contains the most-recent activity (Sensorial in seed data)
  const defaultArea = AREA_LIST.find((a) => SUBTOPICS.some((s) => s.area === a)) || "Sensorial";
  const [area, setArea] = React.useState(defaultArea);

  // when area changes, default-select the first subtopic of that area
  const subsInArea = SUBTOPICS.filter((s) => s.area === area);
  const [subtopic, setSubtopic] = React.useState(subsInArea[0]?.name || null);
  React.useEffect(() => {
    const firstInArea = SUBTOPICS.find((s) => s.area === area);
    setSubtopic(firstInArea?.name || null);
  }, [area]);

  return (
    <React.Fragment>
      <SectionHeading
        overline="Curriculum progress"
        title="Subtopic mastery"
        mobile={mobile}
      />
      <div style={{ padding: mobile ? "8px 16px 36px" : "10px 28px 60px" }}>
        <div className="card" style={{ padding: mobile ? 16 : 22 }}>
          <div style={{ marginBottom: 14 }}>
            <div className="label-cap" style={{ color: "var(--color-ink-muted)", marginBottom: 10 }}>
              Topics
            </div>
            <TopicPicker value={area} onChange={setArea} mobile={mobile} />
          </div>

          <div
            style={{
              borderTop: "1px solid var(--color-border)",
              paddingTop: 14,
            }}
          >
            <div className="label-cap" style={{ color: "var(--color-ink-muted)", marginBottom: 10 }}>
              Subtopics
            </div>
            <SubtopicPicker
              area={area}
              value={subtopic}
              onChange={setSubtopic}
              mobile={mobile}
            />
          </div>

          {subtopic && <SubtopicDetail subtopicName={subtopic} mobile={mobile} />}
        </div>
      </div>
    </React.Fragment>
  );
}

/* ---------------------------------------------------------------- */
/*  Activity view — full observations feed                            */
/* ---------------------------------------------------------------- */

function ActivityView({ mobile }) {
  return (
    <React.Fragment>
      <SectionHeading
        overline="Activity"
        title="All observations"
        accent={mobile ? null : "every material, every cycle"}
        mobile={mobile}
      />
      <div style={{ padding: mobile ? "8px 16px 36px" : "10px 28px 60px" }}>
        <RecentObservations
          mobile={mobile}
          source={TIMELINE}
          headerLabel="Activity feed"
          headerTitle="What Ada has worked with"
          initial={5}
          pageSize={5}
        />
      </div>
    </React.Fragment>
  );
}

function renderPage(pageView, mobile) {
  if (pageView === "whole") return <WholeChildView mobile={mobile} />;
  if (pageView === "activity") return <ActivityView mobile={mobile} />;
  return <CurriculumView mobile={mobile} />;
}

/* ---------------------------------------------------------------- */
/*  Web layout                                                        */
/* ---------------------------------------------------------------- */

function WebView({ pageView, onPageViewChange, onNewObservation, onGenerateReport, newObsOpen, onCloseNewObs }) {
  return (
    <div style={{ background: "var(--color-canvas)", position: "relative" }}>
      <ChildPageHeader
        mobile={false}
        pageView={pageView}
        onNewObservation={onNewObservation}
        onGenerateReport={onGenerateReport}
      />
      <ViewToggle value={pageView} onChange={onPageViewChange} mobile={false} />
      {renderPage(pageView, false)}
      <NewObservationModal
        open={newObsOpen}
        pageView={pageView}
        mobile={false}
        onClose={onCloseNewObs}
      />
    </div>
  );
}

/* ---------------------------------------------------------------- */
/*  Mobile layout                                                     */
/* ---------------------------------------------------------------- */

function MobileView({ pageView, onPageViewChange, onNewObservation, onGenerateReport }) {
  return (
    <div style={{ background: "var(--color-canvas)", paddingTop: 44, position: "relative" }}>
      <ChildPageHeader
        mobile={true}
        pageView={pageView}
        onNewObservation={onNewObservation}
        onGenerateReport={onGenerateReport}
      />
      <ViewToggle value={pageView} onChange={onPageViewChange} mobile={true} />
      {renderPage(pageView, true)}
    </div>
  );
}

/* ---------------------------------------------------------------- */
/*  App shell                                                        */
/* ---------------------------------------------------------------- */

function App() {
  const [tab, setTab] = React.useState("web");
  const [variant, setVariant] = React.useState("warm");
  const [pageView, setPageView] = React.useState("curriculum");
  const [newObsOpen, setNewObsOpen] = React.useState(false);

  const onNewObservation = () => setNewObsOpen(true);
  const onGenerateReport = () => {
    // stub for the mockup
    console.info("[mockup] Generate report clicked for", pageView);
  };
  const onCloseNewObs = () => setNewObsOpen(false);

  return (
    <div data-variant={variant} className="shell">
      <div className="topbar">
        <div className="topbar-inner">
          <div className="brand">
            <span className="brand-mark">m</span>
            <span>Mitable Montessori</span>
            <span
              className="label-cap"
              style={{ color: "var(--color-ink-muted)", marginLeft: 6 }}
            >
              · Child detail
            </span>
          </div>

          <div className="tabs" role="tablist" aria-label="Viewport">
            <button
              type="button"
              className="tab tap"
              data-active={tab === "web"}
              onClick={() => setTab("web")}
              role="tab"
              aria-selected={tab === "web"}
            >
              Web
            </button>
            <button
              type="button"
              className="tab tap"
              data-active={tab === "mobile"}
              onClick={() => setTab("mobile")}
              role="tab"
              aria-selected={tab === "mobile"}
            >
              Mobile
            </button>
          </div>

          <div className="variant-toggle">
            <span className="label-cap">Variant</span>
            <div className="variant-pills">
              <button
                type="button"
                className="variant-pill tap"
                data-active={variant === "warm"}
                onClick={() => setVariant("warm")}
              >
                Warm
              </button>
              <button
                type="button"
                className="variant-pill tap"
                data-active={variant === "quiet"}
                onClick={() => setVariant("quiet")}
              >
                Quiet
              </button>
            </div>
          </div>
        </div>
      </div>

      {tab === "web" ? (
        <div className="viewport-web">
          <div className="frame">
            <WebView
              pageView={pageView}
              onPageViewChange={setPageView}
              onNewObservation={onNewObservation}
              onGenerateReport={onGenerateReport}
              newObsOpen={newObsOpen}
              onCloseNewObs={onCloseNewObs}
            />
          </div>
        </div>
      ) : (
        <div className="viewport-mobile">
          <div className="phone">
            <div className="phone-notch" />
            <div className="phone-content scroll-quiet">
              <MobileView
                pageView={pageView}
                onPageViewChange={setPageView}
                onNewObservation={onNewObservation}
                onGenerateReport={onGenerateReport}
              />
            </div>
            {/* Modal lives at .phone level so it visually clips to the
                phone frame (overflow:hidden) and pins to the visible viewport. */}
            <NewObservationModal
              open={newObsOpen}
              pageView={pageView}
              mobile={true}
              onClose={onCloseNewObs}
            />
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
    </script>
  </body>
</html>
