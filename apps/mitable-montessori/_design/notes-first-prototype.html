<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mitable Montessori · Notes-first prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Caveat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      :root {
        --canvas: #f7f4ee;
        --surface: #fffbf3;
        --surface-2: #f2ede0;
        --muted: #ebe6db;
        --ink: #1f1c18;
        --ink-2: #5c544a;
        --ink-3: #9c9285;
        --border: #e0d8c8;
        --border-2: #d4cab6;
        --clay: #b89880;
        --terracotta: #c46a4f;
        --terracotta-soft: #f4ddd2;
        --terracotta-deep: #a24a3d;
        --sage: #7a9b7a;
        --sage-soft: #dde7da;
        --sage-deep: #3f5c40;
        --butter: #e8c56a;
        --butter-soft: #f6e8b8;
        --dusty: #6b8aa6;
        --dusty-soft: #d2dce5;
        --shadow-1: 0 1px 2px rgba(31, 28, 24, 0.04), 0 1px 1px rgba(31, 28, 24, 0.03);
        --shadow-2: 0 6px 18px rgba(31, 28, 24, 0.08), 0 2px 4px rgba(31, 28, 24, 0.04);
        --shadow-3: 0 18px 44px rgba(31, 28, 24, 0.12), 0 6px 12px rgba(31, 28, 24, 0.06);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #2a2723;
        color: var(--ink);
        font-family:
          'DM Sans', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          sans-serif;
        font-size: 14px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        overflow-x: hidden;
      }

      button {
        font: inherit;
        color: inherit;
        background: none;
        border: 0;
        cursor: pointer;
        padding: 0;
      }
      input,
      textarea {
        font: inherit;
        color: inherit;
        background: none;
        border: 0;
      }
      input:focus,
      textarea:focus,
      button:focus {
        outline: none;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }

      .serif {
        font-family: 'Fraunces', ui-serif, Georgia, serif;
        font-feature-settings: 'ss01';
        letter-spacing: -0.005em;
      }
      .hand {
        font-family: 'Caveat', cursive;
      }
      .tnums {
        font-variant-numeric: tabular-nums;
      }
      .caps {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 10.5px;
        font-weight: 500;
        color: var(--ink-3);
      }

      /* ---------- prototype shell ---------- */
      .shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 28px 28px 56px;
        background:
          radial-gradient(
            1200px 600px at 50% -10%,
            rgba(255, 255, 255, 0.04),
            transparent 70%
          ),
          #2a2723;
      }
      .shell-bar {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 22px;
        color: #d6cdb9;
      }
      .shell-bar .title {
        font-family: 'Fraunces', serif;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.01em;
      }
      .shell-bar .sep {
        opacity: 0.4;
      }
      .shell-bar .meta {
        opacity: 0.7;
        font-size: 12.5px;
      }
      .shell-toggle {
        display: inline-flex;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        padding: 3px;
      }
      .shell-toggle button {
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 12.5px;
        color: #d6cdb9;
        opacity: 0.7;
        transition: all 160ms ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .shell-toggle button.on {
        background: #f7f4ee;
        color: #1f1c18;
        opacity: 1;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      }

      /* ---------- desktop / macOS window ---------- */
      .desktop {
        width: min(1280px, calc(100vw - 56px));
        height: 820px;
        border-radius: 14px;
        background: var(--canvas);
        box-shadow:
          0 40px 80px rgba(0, 0, 0, 0.35),
          0 8px 20px rgba(0, 0, 0, 0.18);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .titlebar {
        height: 38px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px;
        flex: 0 0 auto;
      }
      .traffic {
        display: inline-flex;
        gap: 8px;
      }
      .traffic span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
      }
      .traffic .r {
        background: #ff5f57;
      }
      .traffic .y {
        background: #febc2e;
      }
      .traffic .g {
        background: #28c840;
      }
      .titlebar .tabbtn {
        margin-left: 10px;
        width: 26px;
        height: 22px;
        border-radius: 5px;
        border: 1px solid var(--border-2);
        background: var(--canvas);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-3);
      }
      .titlebar .titletext {
        position: absolute;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 12.5px;
        color: var(--ink-3);
        pointer-events: none;
      }
      .titlebar {
        position: relative;
      }
      .desktop-body {
        flex: 1 1 auto;
        display: grid;
        grid-template-columns: 248px 1fr;
        min-height: 0;
        transition: grid-template-columns 240ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .desktop-body.sidebar-hidden {
        grid-template-columns: 0 1fr;
      }
      .desktop-body.sidebar-hidden .sidebar {
        overflow: hidden;
        padding: 0;
        border-right: 0;
        opacity: 0;
        pointer-events: none;
      }
      .sidebar {
        transition:
          opacity 200ms ease,
          padding 200ms ease;
      }

      /* ---------- sidebar ---------- */
      .sidebar {
        background: var(--canvas);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 14px 12px 12px;
        gap: 4px;
        min-height: 0;
      }
      .search {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 10px;
        background: var(--muted);
        color: var(--ink-3);
        font-size: 13px;
        margin-bottom: 8px;
      }
      .search .kbd {
        margin-left: auto;
        font-size: 11px;
        color: var(--ink-3);
        opacity: 0.7;
      }
      .nav {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .nav .item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 10px;
        border-radius: 8px;
        color: var(--ink);
        font-size: 13.5px;
        font-weight: 500;
        transition: background 140ms ease;
      }
      .nav .item:hover {
        background: var(--muted);
      }
      .nav .item.active {
        background: var(--muted);
      }
      .nav .item .ico {
        color: var(--ink-2);
        opacity: 0.85;
        flex: 0 0 auto;
      }
      .nav .item .count {
        margin-left: auto;
        font-size: 11.5px;
        color: var(--ink-3);
      }
      .nav .item .dot {
        margin-left: auto;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--terracotta);
      }
      .nav-section-label {
        padding: 14px 10px 6px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink-3);
        font-weight: 600;
      }
      .nav .sub {
        padding-left: 26px;
        font-weight: 400;
        color: var(--ink-2);
        font-size: 13px;
      }
      .nav .sub.active {
        background: var(--muted);
        color: var(--ink);
      }
      .nav .sub.add {
        color: var(--ink-3);
      }
      .nav .sub .swatch {
        width: 14px;
        height: 14px;
        border-radius: 4px;
        flex: 0 0 auto;
      }
      .sidebar-footer {
        margin-top: auto;
        padding-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .sidebar-foot-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-top: 1px solid var(--border);
        font-size: 13px;
      }
      .sidebar-foot-row .avatar {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: var(--sage);
        color: #fff;
        font-weight: 600;
        font-size: 11px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }

      /* ---------- main canvas ---------- */
      .main {
        position: relative;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .main-scroll {
        flex: 1 1 auto;
        overflow-y: auto;
        position: relative;
      }
      .main-inner {
        max-width: 880px;
        margin: 0 auto;
        padding: 44px 56px 220px;
      }
      .top-actions {
        position: absolute;
        top: 12px;
        right: 18px;
        display: flex;
        gap: 8px;
        z-index: 5;
      }
      .sidebar-toggle {
        margin-left: 6px;
        width: 28px;
        height: 26px;
        border-radius: 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-2);
        background: transparent;
      }
      .sidebar-toggle:hover {
        background: var(--muted);
        color: var(--ink);
      }
      .sidebar-toggle.on {
        color: var(--ink);
      }

      /* page hero (no inline CTA anymore — CTA is its own row) */
      .page-header-row {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 22px;
      }
      .page-header-row .left {
        min-width: 0;
      }

      /* Large list-row CTA (sits at the top of the list, sized like 2 list items) */
      .cta-big {
        display: grid;
        grid-template-columns: 64px 1fr auto;
        gap: 20px;
        align-items: center;
        width: 100%;
        text-align: left;
        padding: 22px 24px 22px 20px;
        background: var(--ink);
        color: var(--canvas);
        border-radius: 18px;
        box-shadow: var(--shadow-2);
        transition: transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 160ms ease;
        margin: 4px 0 14px;
      }
      .cta-big:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-3);
      }
      .cta-big .icon-circle {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--canvas);
        position: relative;
      }
      .cta-big .icon-circle::after {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .cta-big .label {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .cta-big .label .t {
        font-family: 'Fraunces', serif;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: -0.005em;
        line-height: 1.1;
      }
      .cta-big .label .s {
        font-size: 12.5px;
        color: rgba(245, 240, 224, 0.7);
        font-weight: 400;
      }
      .cta-big .arrow-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--canvas);
        color: var(--ink);
        transition: transform 140ms ease;
      }
      .cta-big:hover .arrow-pill {
        transform: translateX(2px);
      }

      /* voice capture screen */
      .capture {
        max-width: 540px;
        margin: 28px auto 0;
        padding: 24px 0 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .capture .kicker {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink-3);
        font-weight: 600;
        margin-bottom: 8px;
      }
      .capture h1 {
        font-family: 'Fraunces', serif;
        font-weight: 500;
        font-size: 34px;
        line-height: 1.1;
        margin: 0 0 6px;
        letter-spacing: -0.012em;
      }
      .capture p.cue {
        color: var(--ink-2);
        font-size: 14px;
        margin: 0 0 32px;
      }
      .mic-btn {
        width: 116px;
        height: 116px;
        border-radius: 50%;
        background: var(--terracotta);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 14px 36px rgba(196, 106, 79, 0.32),
          0 0 0 0 rgba(196, 106, 79, 0.4);
        transition: transform 200ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .mic-btn:hover {
        transform: scale(1.04);
      }
      .mic-btn.recording {
        background: var(--terracotta-deep);
        animation: micPulse 1.6s infinite ease-in-out;
      }
      @keyframes micPulse {
        0%, 100% {
          box-shadow:
            0 14px 36px rgba(196, 106, 79, 0.32),
            0 0 0 0 rgba(196, 106, 79, 0.45);
        }
        50% {
          box-shadow:
            0 14px 36px rgba(196, 106, 79, 0.32),
            0 0 0 22px rgba(196, 106, 79, 0);
        }
      }
      .mic-btn .stop-square {
        width: 28px;
        height: 28px;
        border-radius: 5px;
        background: #fff;
      }
      .capture .timer {
        margin-top: 18px;
        font-family: 'Fraunces', serif;
        font-feature-settings: 'tnum';
        font-variant-numeric: tabular-nums;
        font-size: 28px;
        color: var(--ink);
      }
      .capture .waveform {
        display: inline-flex;
        gap: 4px;
        align-items: center;
        height: 36px;
        margin-top: 14px;
      }
      .capture .waveform span {
        width: 3px;
        background: var(--terracotta);
        border-radius: 999px;
        opacity: 0.85;
      }
      .capture .waveform.live span {
        animation: waveBar 0.9s infinite ease-in-out;
      }
      .capture .waveform span:nth-child(1) { animation-delay: 0.00s; height: 14px; }
      .capture .waveform span:nth-child(2) { animation-delay: 0.06s; height: 22px; }
      .capture .waveform span:nth-child(3) { animation-delay: 0.12s; height: 32px; }
      .capture .waveform span:nth-child(4) { animation-delay: 0.18s; height: 20px; }
      .capture .waveform span:nth-child(5) { animation-delay: 0.24s; height: 28px; }
      .capture .waveform span:nth-child(6) { animation-delay: 0.30s; height: 12px; }
      .capture .waveform span:nth-child(7) { animation-delay: 0.36s; height: 24px; }
      .capture .waveform span:nth-child(8) { animation-delay: 0.42s; height: 30px; }
      .capture .waveform span:nth-child(9) { animation-delay: 0.48s; height: 18px; }
      .capture .waveform span:nth-child(10) { animation-delay: 0.54s; height: 26px; }
      .capture .waveform span:nth-child(11) { animation-delay: 0.60s; height: 14px; }
      .capture .waveform span:nth-child(12) { animation-delay: 0.66s; height: 22px; }
      @keyframes waveBar {
        0%, 100% {
          transform: scaleY(0.45);
        }
        50% {
          transform: scaleY(1);
        }
      }
      .capture .live-transcript {
        margin-top: 26px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px 26px;
        text-align: left;
        font-size: 15.5px;
        line-height: 1.7;
        color: var(--ink);
        width: 100%;
        max-width: 620px;
        min-height: 130px;
      }
      .capture .live-transcript .ph {
        color: var(--ink-3);
        font-style: italic;
      }
      .capture .live-transcript .cursor {
        display: inline-block;
        width: 2px;
        height: 18px;
        background: var(--terracotta);
        vertical-align: -3px;
        margin-left: 2px;
        animation: blink 0.9s infinite;
      }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .capture .actions {
        margin-top: 22px;
        display: flex;
        gap: 10px;
      }
      .capture .actions .save {
        background: var(--ink);
        color: var(--canvas);
        padding: 10px 18px;
        border-radius: 999px;
        font-size: 13.5px;
        font-weight: 500;
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }
      .capture .actions .discard {
        color: var(--ink-3);
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 13px;
      }

      /* inline editable note (document mode) */
      .note-body [contenteditable]:focus {
        outline: none;
      }
      .note-body .editable {
        border-radius: 4px;
        padding: 2px 4px;
        margin: -2px -4px;
        transition: background 140ms ease;
        cursor: text;
      }
      .note-body .editable:hover {
        background: rgba(184, 152, 128, 0.08);
      }
      .note-body .editable:focus {
        background: var(--surface);
        box-shadow: 0 0 0 2px var(--butter-soft);
      }
      .note-h1.editable {
        border-radius: 6px;
        padding: 2px 6px;
        margin: 0 -6px 4px;
      }
      .note-stamp.editable {
        cursor: text;
      }
      /* placeholder for blank editable elements when empty */
      [contenteditable][data-placeholder]:empty::before {
        content: attr(data-placeholder);
        color: var(--ink-3);
        opacity: 0.55;
        pointer-events: none;
        font-style: italic;
      }
      .note-h1[data-placeholder]:empty::before {
        font-style: normal;
        opacity: 0.4;
      }

      /* voice-mode dock — replaces the chat input on the Note view */
      .dock.voice-mode {
        background: var(--surface);
      }
      .dock-voice-row {
        display: grid;
        grid-template-columns: 60px 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 12px 16px 12px 12px;
        min-height: 72px;
      }
      .dock-mic {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--terracotta);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 6px 16px rgba(196, 106, 79, 0.28),
          0 0 0 0 rgba(196, 106, 79, 0.4);
        transition: transform 140ms ease;
        flex: 0 0 auto;
      }
      .dock-mic:hover {
        transform: scale(1.04);
      }
      .dock-mic.recording {
        animation: micPulse 1.6s infinite ease-in-out;
      }
      .dock-mic .stop-square {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        background: #fff;
      }
      .dock-voice-row .label {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .dock-voice-row .label .t {
        font-size: 13.5px;
        font-weight: 500;
        color: var(--ink);
      }
      .dock-voice-row .label .s {
        font-size: 11.5px;
        color: var(--ink-3);
      }
      .dock-voice-row .timer {
        font-family: 'Fraunces', serif;
        font-variant-numeric: tabular-nums;
        font-size: 18px;
        color: var(--ink);
      }
      .dock-voice-row .wave-mini {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        height: 22px;
      }
      .dock-voice-row .wave-mini span {
        width: 2.5px;
        background: var(--terracotta);
        border-radius: 999px;
      }
      .dock-voice-row .wave-mini.live span {
        animation: waveBar 0.9s infinite ease-in-out;
      }
      .dock-voice-row .wave-mini span:nth-child(1) { animation-delay: 0.00s; height: 10px; }
      .dock-voice-row .wave-mini span:nth-child(2) { animation-delay: 0.06s; height: 16px; }
      .dock-voice-row .wave-mini span:nth-child(3) { animation-delay: 0.12s; height: 20px; }
      .dock-voice-row .wave-mini span:nth-child(4) { animation-delay: 0.18s; height: 14px; }
      .dock-voice-row .wave-mini span:nth-child(5) { animation-delay: 0.24s; height: 18px; }
      .dock-voice-row .wave-mini span:nth-child(6) { animation-delay: 0.30s; height: 10px; }
      .dock-voice-row .wave-mini span:nth-child(7) { animation-delay: 0.36s; height: 16px; }
      .dock-voice-row .wave-mini span:nth-child(8) { animation-delay: 0.42s; height: 12px; }
      .dock-voice-row .switch-mode {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--canvas);
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--ink-2);
        font-weight: 500;
      }
      .dock-voice-row .switch-mode:hover {
        background: var(--muted);
      }
      /* live transcription cursor inside note body */
      .live-write {
        background: linear-gradient(90deg, var(--butter-soft) 0%, transparent 100%);
        padding: 2px 4px;
        margin: -2px -4px;
        border-radius: 4px;
      }
      .live-write::after {
        content: '';
        display: inline-block;
        width: 2px;
        height: 17px;
        background: var(--terracotta);
        vertical-align: -3px;
        margin-left: 2px;
        animation: blink 0.9s infinite;
      }
      .edit-hint {
        margin-top: 22px;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        font-size: 12px;
        color: var(--ink-3);
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--muted);
      }

      /* report row actions */
      .report-row .row-actions {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        opacity: 0;
        transition: opacity 140ms ease;
      }
      .report-row:hover .row-actions {
        opacity: 1;
      }
      .report-row .row-actions .iconbtn {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: var(--canvas);
        border: 1px solid var(--border);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-2);
      }
      .report-row .row-actions .iconbtn:hover {
        background: var(--surface);
        color: var(--ink);
      }

      /* report top actions */
      .report-top-actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
        align-items: center;
      }
      .report-top-actions .btn-pri {
        background: var(--terracotta);
        color: #fff;
        padding: 8px 16px 8px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
        display: inline-flex;
        gap: 7px;
        align-items: center;
        box-shadow: var(--shadow-1);
      }
      .report-top-actions .btn-pri:hover {
        background: var(--terracotta-deep);
      }
      .report-top-actions .btn-sec {
        background: var(--surface);
        color: var(--ink);
        border: 1px solid var(--border);
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
        display: inline-flex;
        gap: 7px;
        align-items: center;
      }
      .report-top-actions .btn-sec:hover {
        background: var(--muted);
      }
      .report-top-actions .sent-stamp {
        margin-left: auto;
        font-size: 11.5px;
        color: var(--sage-deep);
        background: var(--sage-soft);
        padding: 4px 10px;
        border-radius: 999px;
        font-weight: 500;
      }

      /* PDF preview modal */
      .modal-bg {
        position: absolute;
        inset: 0;
        background: rgba(20, 16, 12, 0.5);
        backdrop-filter: blur(4px);
        z-index: 80;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
        animation: fadeIn 200ms ease;
      }
      .modal-card {
        background: var(--canvas);
        border-radius: 14px;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        width: min(820px, 100%);
        max-height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: popIn 260ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .modal-head {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
      }
      .modal-head .file-ico {
        width: 32px;
        height: 32px;
        border-radius: 7px;
        background: var(--terracotta-soft);
        color: var(--terracotta-deep);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 0.05em;
      }
      .modal-head .file-meta {
        display: flex;
        flex-direction: column;
        line-height: 1.25;
      }
      .modal-head .file-meta .t {
        font-size: 13.5px;
        font-weight: 500;
      }
      .modal-head .file-meta .s {
        font-size: 11.5px;
        color: var(--ink-3);
      }
      .modal-head .actions {
        margin-left: auto;
        display: inline-flex;
        gap: 8px;
        align-items: center;
      }
      .modal-head .actions button {
        padding: 7px 13px;
        border-radius: 999px;
        font-size: 12.5px;
        font-weight: 500;
        border: 1px solid var(--border);
        background: var(--surface);
      }
      .modal-head .actions button.primary {
        background: var(--ink);
        color: var(--canvas);
        border-color: var(--ink);
      }
      .modal-head .closebtn {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-2);
        background: var(--muted);
      }
      .modal-body {
        flex: 1 1 auto;
        overflow-y: auto;
        background: linear-gradient(180deg, #c8c0b0 0%, #b8b0a0 100%);
        padding: 28px;
      }
      .pdf-sheet {
        background: #fff;
        margin: 0 auto;
        max-width: 600px;
        padding: 56px 60px 64px;
        box-shadow:
          0 1px 0 rgba(0, 0, 0, 0.04),
          0 18px 40px rgba(0, 0, 0, 0.22),
          0 6px 12px rgba(0, 0, 0, 0.1);
        border-radius: 2px;
        color: #1f1c18;
        font-size: 11px;
        line-height: 1.55;
      }
      .pdf-sheet + .pdf-sheet {
        margin-top: 22px;
      }
      .pdf-sheet .pdf-head {
        text-align: center;
        margin-bottom: 28px;
        padding-bottom: 22px;
        border-bottom: 1px solid #d9d3c4;
      }
      .pdf-sheet .pdf-head .crest {
        font-family: 'Caveat', cursive;
        font-size: 16px;
        color: var(--clay);
        margin-bottom: 6px;
      }
      .pdf-sheet .pdf-head h1 {
        font-family: 'Fraunces', serif;
        font-weight: 500;
        font-size: 26px;
        margin: 0 0 4px;
        letter-spacing: -0.01em;
      }
      .pdf-sheet .pdf-head .kicker {
        font-size: 9.5px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #5c544a;
      }
      .pdf-sheet h2 {
        font-family: 'Fraunces', serif;
        font-weight: 500;
        font-size: 14.5px;
        margin: 18px 0 4px;
        letter-spacing: -0.005em;
      }
      .pdf-sheet h2 .lead {
        font-size: 9px;
        font-weight: 600;
        color: #9c9285;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-right: 8px;
      }
      .pdf-sheet .pdf-rule {
        height: 1px;
        background: #ece4d2;
        margin: 4px 0 8px;
      }
      .pdf-sheet p {
        margin: 0 0 8px;
        font-size: 10.5px;
        line-height: 1.65;
      }
      .pdf-sheet .pdf-meta-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin: 14px 0 0;
        font-size: 10px;
      }
      .pdf-sheet .pdf-meta-grid .cell .lab {
        font-size: 8.5px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #9c9285;
        margin-bottom: 2px;
      }
      .pdf-sheet .pdf-foot {
        margin-top: 24px;
        padding-top: 14px;
        border-top: 1px solid #ece4d2;
        display: flex;
        justify-content: space-between;
        align-items: end;
      }
      .pdf-sheet .pdf-sig {
        font-family: 'Caveat', cursive;
        font-size: 22px;
      }
      .pdf-sheet .pdf-page-no {
        font-size: 9px;
        color: #9c9285;
        font-variant-numeric: tabular-nums;
      }

      /* send composer */
      .send-card {
        max-width: 560px;
        margin: 8px auto 0;
        background: var(--canvas);
        border-radius: 14px;
        padding: 22px 24px;
      }
      .send-card .row {
        display: grid;
        grid-template-columns: 80px 1fr;
        gap: 14px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        font-size: 13.5px;
      }
      .send-card .row .lab {
        color: var(--ink-3);
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 600;
        padding-top: 3px;
      }
      .send-card .row .val .chip {
        margin-right: 6px;
      }
      .send-card .preview-body {
        padding: 14px 0 0;
        font-size: 13.5px;
        line-height: 1.6;
        color: var(--ink);
      }
      .send-card .send-actions {
        display: flex;
        gap: 8px;
        margin-top: 18px;
        justify-content: flex-end;
      }

      /* sent toast */
      .toast {
        position: absolute;
        top: 60px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ink);
        color: var(--canvas);
        padding: 11px 18px 11px 14px;
        border-radius: 999px;
        font-size: 13px;
        box-shadow: var(--shadow-3);
        display: inline-flex;
        gap: 10px;
        align-items: center;
        z-index: 90;
        animation: toastIn 240ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .toast .check {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--sage);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      @keyframes toastIn {
        from {
          transform: translate(-50%, -10px);
          opacity: 0;
        }
        to {
          transform: translate(-50%, 0);
          opacity: 1;
        }
      }

      /* reports list (replaces picker grid as the new default landing for Reports) */
      .reports-list {
        margin-top: 6px;
      }
      .report-row {
        display: grid;
        grid-template-columns: 56px 1fr 90px 70px;
        gap: 18px;
        align-items: center;
        padding: 14px 0;
        border-top: 1px dashed var(--border);
        text-align: left;
        width: 100%;
        cursor: pointer;
        transition: background 140ms ease;
      }
      .report-row:hover {
        background: rgba(184, 152, 128, 0.06);
      }
      .report-row .av {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .report-row .meta {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .report-row .meta .t {
        font-size: 14.5px;
        font-weight: 500;
      }
      .report-row .meta .s {
        font-size: 12px;
        color: var(--ink-3);
        margin-top: 2px;
      }
      .report-row .status {
        display: inline-flex;
        align-items: center;
        justify-self: end;
        width: auto;
        font-size: 11.5px;
        font-weight: 500;
        padding: 2px 9px;
        border-radius: 999px;
        background: var(--muted);
        color: var(--ink-2);
      }
      .report-row .status.draft {
        background: var(--butter-soft);
        color: var(--butter-deep);
      }
      .report-row .status.sent {
        background: var(--sage-soft);
        color: var(--sage-deep);
      }
      .report-row .when {
        font-size: 12.5px;
        color: var(--ink-3);
        font-variant-numeric: tabular-nums;
      }

      /* shell-bar additions */
      .shell-toggle.compact button {
        padding: 6px 11px;
        font-size: 12px;
      }
      .shell-bar .label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(214, 205, 185, 0.5);
        margin-right: 6px;
      }
      .top-actions .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--ink);
        font-size: 12.5px;
        font-weight: 500;
        box-shadow: var(--shadow-1);
      }
      .top-actions .pill:hover {
        background: var(--muted);
      }

      /* page hero */
      .page-h1 {
        font-family: 'Fraunces', serif;
        font-weight: 500;
        font-size: 44px;
        line-height: 1.05;
        letter-spacing: -0.015em;
        color: var(--ink);
        margin: 0 0 4px;
      }
      .page-sub {
        color: var(--ink-2);
        font-size: 14.5px;
        margin: 0 0 28px;
      }

      /* date group header (notes list) */
      .day-row {
        display: grid;
        grid-template-columns: 86px 1fr auto;
        gap: 18px;
        align-items: baseline;
        padding: 18px 0 8px;
      }
      .day-num {
        font-family: 'Fraunces', serif;
        font-weight: 500;
        font-size: 32px;
        line-height: 1;
        color: var(--ink);
      }
      .day-meta {
        display: flex;
        flex-direction: column;
        margin-top: 4px;
      }
      .day-meta .mo {
        font-size: 11.5px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--ink-2);
      }
      .day-meta .dw {
        font-size: 11.5px;
        color: var(--ink-3);
      }
      .day-tally {
        color: var(--ink-3);
        font-size: 12.5px;
        font-variant-numeric: tabular-nums;
      }

      /* note row */
      .note-row {
        display: grid;
        grid-template-columns: 86px 40px 1fr auto;
        gap: 18px;
        align-items: center;
        padding: 12px 0;
        border-top: 1px dashed var(--border);
        text-align: left;
        width: 100%;
        cursor: pointer;
        transition: background 140ms ease;
      }
      .note-row:hover {
        background: rgba(184, 152, 128, 0.06);
      }
      .note-row .avatar {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        color: #fff;
        font-weight: 600;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }
      .note-row .title {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .note-row .title .t {
        font-weight: 500;
        font-size: 14.5px;
        color: var(--ink);
        line-height: 1.35;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .note-row .title .meta {
        font-size: 12px;
        color: var(--ink-3);
        margin-top: 2px;
      }
      .note-row .time {
        font-size: 12.5px;
        color: var(--ink-3);
        font-variant-numeric: tabular-nums;
      }
      .note-row.today .avatar::after {
        content: '';
        display: none;
      }
      .note-row .today-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--terracotta);
        margin-left: 4px;
        display: inline-block;
        transform: translateY(-1px);
      }

      /* upgrade ribbon */
      .upgrade {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 18px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        margin: 22px 0;
        font-size: 13.5px;
        color: var(--ink-2);
        box-shadow: var(--shadow-1);
      }
      .upgrade .view {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--canvas);
        border: 1px solid var(--border);
        padding: 5px 12px;
        border-radius: 999px;
        font-weight: 500;
        font-size: 12.5px;
        color: var(--ink);
      }
      .upgrade .view .arrow {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--sage-deep);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      /* tag chip */
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 9px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--ink-2);
        font-weight: 500;
      }
      .chip .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .chip.terracotta .dot {
        background: var(--terracotta);
      }
      .chip.sage .dot {
        background: var(--sage);
      }
      .chip.dusty .dot {
        background: var(--dusty);
      }
      .chip.butter .dot {
        background: var(--butter);
      }
      .chip.clay .dot {
        background: var(--clay);
      }

      /* single note */
      .note-page {
        max-width: 680px;
        margin: 0 auto;
        padding: 36px 0 320px;
      }
      .back-row {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--ink-2);
        margin-bottom: 22px;
        cursor: pointer;
      }
      .back-row:hover {
        color: var(--ink);
      }
      .note-meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 8px 0 14px;
      }
      .note-h1 {
        font-family: 'Fraunces', serif;
        font-weight: 500;
        font-size: 34px;
        line-height: 1.1;
        letter-spacing: -0.012em;
        margin: 0 0 4px;
      }
      .note-stamp {
        font-family: 'Caveat', cursive;
        font-weight: 500;
        font-size: 20px;
        color: var(--clay);
        margin: 18px 0 2px;
      }
      .note-body p {
        margin: 0 0 14px;
        font-size: 15px;
        line-height: 1.7;
        color: var(--ink);
      }
      .note-body p .mention {
        background: var(--sage-soft);
        color: var(--sage-deep);
        padding: 1px 6px;
        border-radius: 6px;
        font-weight: 500;
      }
      .note-body p .work {
        background: var(--butter-soft);
        padding: 1px 4px;
        border-radius: 4px;
      }
      .note-body p.added {
        background: var(--sage-soft);
        padding: 10px 12px;
        border-radius: 8px;
        animation: fadeIn 600ms ease;
        transition: background 1200ms ease;
      }
      .note-body p.added.settled {
        background: transparent;
      }
      .ghost {
        color: var(--terracotta-deep);
        border-bottom: 1.5px dashed var(--terracotta);
        padding-bottom: 1px;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translate(-50%, 12px);
        }
        to {
          opacity: 1;
          transform: translate(-50%, 0);
        }
      }
      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.95);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* reports */
      .reports-grid {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 32px;
        margin-top: 8px;
      }
      .roster {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .roster .row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 10px;
        border-radius: 10px;
        cursor: pointer;
        transition: background 140ms ease;
        text-align: left;
        width: 100%;
      }
      .roster .row:hover {
        background: var(--muted);
      }
      .roster .row.active {
        background: var(--muted);
      }
      .roster .av {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        color: #fff;
        font-weight: 600;
        font-size: 12.5px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }
      .roster .name {
        font-size: 13.5px;
        font-weight: 500;
      }
      .roster .age {
        font-size: 11.5px;
        color: var(--ink-3);
      }

      .templates {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
      .template {
        display: flex;
        flex-direction: column;
        gap: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        cursor: pointer;
        transition: all 180ms ease;
        text-align: left;
      }
      .template:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-2);
        border-color: var(--border-2);
      }
      .template .preview {
        height: 144px;
        background: var(--canvas);
        border-bottom: 1px solid var(--border);
        position: relative;
        padding: 14px;
        font-family: 'Fraunces', serif;
        overflow: hidden;
      }
      .template .preview .ph-h {
        font-size: 11px;
        line-height: 1.2;
        color: var(--ink);
        font-weight: 500;
        margin-bottom: 6px;
      }
      .template .preview .ph-body span {
        display: block;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin-bottom: 5px;
      }

        'Afterwards she asked me where the sponges live and put hers back without being prompted. ' +

      // VoiceDock: the chat-dock-shaped recording surface that appears in place of the chat dock
      // when the user is viewing a note. Tapping the mic streams the simulated transcript into
      // the note body via DOM manipulation (because the body is contentEditable, React doesn't own it).
      function VoiceDock({ noteContext }) {
        const [phase, setPhase] = useState('idle'); // idle | recording
        const [elapsed, setElapsed] = useState(0);
        const timersRef = useRef([]);

        useEffect(() => {
          // reset when note context changes
          setPhase('idle');
          setElapsed(0);
          timersRef.current.forEach(clearTimeout);
          timersRef.current = [];
          return () => timersRef.current.forEach(clearTimeout);
        }, [noteContext.noteId, noteContext.isNew]);

        useEffect(() => {
          if (phase !== 'recording') return;
          const start = Date.now();
          const i = setInterval(() => setElapsed(Math.floor((Date.now() - start) / 1000)), 250);
          return () => clearInterval(i);
        }, [phase]);

        const fmt = (s) =>
          `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;

        const startRecording = () => {
          // find the live-write target inside the note body. We append a new paragraph
          // marked with the .live-write class so the user can see what's streaming in.
          const body = document.querySelector('.note-body');
          if (!body) return;
          // remove any existing live-write paragraph
          body.querySelectorAll('p.live-write').forEach((el) => el.remove());
          const p = document.createElement('p');
          p.className = 'live-write editable';
          p.setAttribute('contenteditable', 'true');
          p.setAttribute('spellcheck', 'false');
          body.appendChild(p);

          setPhase('recording');

          const words = CAPTURE_SCRIPT.split(/(\s+)/).filter(Boolean);
          let accumulated = '';
          words.forEach((w, i) => {
            const t = setTimeout(() => {
              accumulated += w;
              p.textContent = accumulated;
            }, 380 + i * 95);
            timersRef.current.push(t);
          });
          // when finished, drop the live-write class
          const done = setTimeout(() => {
            p.classList.remove('live-write');
            setPhase('idle');
          }, 380 + words.length * 95 + 800);
          timersRef.current.push(done);
        };

        const stopRecording = () => {
          timersRef.current.forEach(clearTimeout);
          timersRef.current = [];
          // remove the cursor underline from the live paragraph
          const live = document.querySelector('.note-body p.live-write');
          if (live) live.classList.remove('live-write');
          setPhase('idle');
        };

        return (
          <div className="dock-wrap">
            <div className="dock voice-mode collapsed">
              <div className="dock-voice-row">
                <button
                  className={'dock-mic' + (phase === 'recording' ? ' recording' : '')}
                  onClick={phase === 'recording' ? stopRecording : startRecording}
                  aria-label={phase === 'recording' ? 'Stop recording' : 'Record'}
                >
                  {phase === 'recording' ? <span className="stop-square" /> : <IconMic size={20} stroke={1.6} />}
                </button>
                <div className="label">
                  {phase === 'recording' ? (
                    <>
                      <span className="t">Listening…</span>
                      <span className="s">Speak naturally — I'm writing it down for you.</span>
                    </>
                  ) : (

                      <span className="s">Or click into the document above to type.</span>

                </div>
                {phase === 'recording' ? (
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 12 }}>
                    <span className="wave-mini live">
                      <span /><span /><span /><span /><span /><span /><span /><span />
                    </span>
                    <span className="timer">{fmt(elapsed)}</span>
                  </span>
                ) : (
                  <button className="switch-mode" onClick={() => {
                    const firstP = document.querySelector('.note-body p.editable');
                    if (firstP) firstP.focus();
                  }}>
                    <IconWand size={11} stroke={1.8} /> Type instead
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      }

      // mobile voice dock — same logic as desktop VoiceDock but rendered in the ios-dock-wrap
      function MobileVoiceDock({ noteContext }) {
        const [phase, setPhase] = useState('idle');
        const [elapsed, setElapsed] = useState(0);
        const timersRef = useRef([]);

        useEffect(() => {
          setPhase('idle');
          setElapsed(0);
          timersRef.current.forEach(clearTimeout);
          timersRef.current = [];
          return () => timersRef.current.forEach(clearTimeout);
        }, [noteContext.noteId, noteContext.isNew]);

        useEffect(() => {
          if (phase !== 'recording') return;
          const start = Date.now();
          const i = setInterval(() => setElapsed(Math.floor((Date.now() - start) / 1000)), 250);
          return () => clearInterval(i);
        }, [phase]);

        const fmt = (s) =>
          `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;

        const start = () => {
          const body = document.querySelector('.note-body');
          if (!body) return;
          body.querySelectorAll('p.live-write').forEach((el) => el.remove());
          const p = document.createElement('p');
          p.className = 'live-write editable';
          p.setAttribute('contenteditable', 'true');
          p.setAttribute('spellcheck', 'false');
          p.style.fontSize = '14.5px';
          p.style.lineHeight = '1.65';
          body.appendChild(p);
          setPhase('recording');

          const words = CAPTURE_SCRIPT.split(/(\s+)/).filter(Boolean);
          let accumulated = '';
          words.forEach((w, i) => {
            const t = setTimeout(() => {
              accumulated += w;
              p.textContent = accumulated;
            }, 380 + i * 95);
            timersRef.current.push(t);
          });
          const done = setTimeout(() => {
            p.classList.remove('live-write');
            setPhase('idle');
          }, 380 + words.length * 95 + 800);
          timersRef.current.push(done);
        };

        const stop = () => {
          timersRef.current.forEach(clearTimeout);
          timersRef.current = [];
          const live = document.querySelector('.note-body p.live-write');
          if (live) live.classList.remove('live-write');
          setPhase('idle');
        };

        return (
          <div className="ios-dock-wrap">
            <div className="ios-dock voice-mode collapsed" style={{ background: 'var(--surface)' }}>
              <div className="dock-voice-row" style={{ padding: '10px 12px 10px 10px', gridTemplateColumns: '46px 1fr auto' }}>
                <button
                  className={'dock-mic' + (phase === 'recording' ? ' recording' : '')}
                  onClick={phase === 'recording' ? stop : start}
                  style={{ width: 42, height: 42 }}
                >
                  {phase === 'recording' ? <span className="stop-square" style={{ width: 12, height: 12 }} /> : <IconMic size={18} stroke={1.6} />}
                </button>
                <div className="label">
                  {phase === 'recording' ? (
                    <>
                      <span className="t" style={{ fontSize: 12.5 }}>Listening…</span>
                      <span className="s" style={{ fontSize: 11 }}>Speak naturally.</span>
                    </>
                  ) : (
                    <>
                      <span className="t" style={{ fontSize: 12.5 }}>
                        {noteContext.isNew ? 'Tap to record' : 'Add by voice'}
                      </span>
                      <span className="s" style={{ fontSize: 11 }}>Or tap above to type.</span>
                    </>
                  )}
                </div>
                {phase === 'recording' && (
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
                    <span className="wave-mini live">
                      <span /><span /><span /><span /><span /><span />
                    </span>
                    <span className="timer" style={{ fontSize: 14 }}>{fmt(elapsed)}</span>
                  </span>
                )}
              </div>
            </div>
          </div>
        );
      }

              {copy.h1}
            </h1>
            <p style={{ color: 'var(--ink-2)', fontSize: 13.5, margin: '0 16px 22px' }}>{copy.sub}</p>
            <button
              className="start"
              onClick={onStart}
              style={{
                background: 'var(--ink)',
                color: 'var(--canvas)',
                padding: '8px 16px',
                borderRadius: 999,
                fontSize: 13,
                fontWeight: 500,
                display: 'inline-flex',
                alignItems: 'center',
                gap: 6,
              }}
            >
              <IconPlus size={13} stroke={2} /> {copy.cta}
            </button>
          </div>
        );
      }

      function MobileNotesList({ onNew, onOpen }) {
        const groups = [];
        const byDay = {};
        NOTES.forEach((n) => {
          if (!byDay[n.dateLabel]) {
            byDay[n.dateLabel] = { label: n.dateLabel, dayNum: n.dayNum, mo: n.mo, dw: n.dw, notes: [] };
            groups.push(byDay[n.dateLabel]);
          }
          byDay[n.dateLabel].notes.push(n);
        });
        return (
          <div>
            <h1 className="ios-h">Today, Wednesday</h1>
            <p className="ios-sub">Fourteen of fifteen children present.</p>
            <button
              onClick={onNew}
              style={{
                display: 'grid',
                gridTemplateColumns: '48px 1fr auto',
                gap: 14,
                width: '100%',
                padding: '16px 16px 16px 14px',
                background: 'var(--ink)',
                color: 'var(--canvas)',
                borderRadius: 16,
                marginBottom: 10,
                marginTop: 6,
                textAlign: 'left',
                alignItems: 'center',
                boxShadow: 'var(--shadow-2)',
              }}
            >
              <span
                style={{
                  width: 44,
                  height: 44,
                  borderRadius: 999,
                  background: 'rgba(255,255,255,0.10)',
                  display: 'inline-flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  flex: '0 0 auto',
                }}
              >
                <IconMic size={22} stroke={1.6} />
              </span>
              <span style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                <span className="serif" style={{ fontWeight: 500, fontSize: 17, lineHeight: 1.15 }}>
                  Record a new note
                </span>
                <span style={{ fontSize: 11.5, color: 'rgba(245, 240, 224, 0.7)' }}>
                  Speak — I'll transcribe it for you.
                </span>
              </span>
              <span
                style={{
                  width: 28,
                  height: 28,
                  borderRadius: 999,
                  background: 'var(--canvas)',
                  color: 'var(--ink)',
                  display: 'inline-flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                }}
              >
                <IconArrowRight size={14} stroke={2} />
              </span>
            </button>
            {groups.map((g) => (
              <div key={g.label} style={{ marginBottom: 4 }}>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, padding: '14px 0 6px' }}>
                  <span className="serif" style={{ fontWeight: 500, fontSize: 22 }}>{g.dayNum}</span>
                  <span className="caps" style={{ fontSize: 10.5 }}>{g.mo}</span>
                  <span style={{ color: 'var(--ink-3)', fontSize: 12, marginLeft: 2 }}>{g.dw} · {g.label}</span>
                  <span style={{ marginLeft: 'auto', color: 'var(--ink-3)', fontSize: 11.5 }}>{g.notes.length}</span>
                </div>
                {g.notes.map((n) => (
                  <button
                    key={n.id}
                    onClick={() => onOpen(n.id)}
                    style={{
                      display: 'flex',
                      gap: 12,
                      width: '100%',
                      textAlign: 'left',
                      padding: '10px 0',
                      borderTop: '1px dashed var(--border)',
                    }}
                  >
                    <span
                      style={{
                        width: 32,
                        height: 32,
                        borderRadius: 999,
                        background: childById(n.tags[0]).hex,
                        color: '#fff',
                        fontSize: 12,
                        fontWeight: 600,
                        display: 'inline-flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        flex: '0 0 auto',
                      }}
                    >
                      {childById(n.tags[0]).initials}
                    </span>
                    <span style={{ display: 'flex', flexDirection: 'column', minWidth: 0, flex: 1 }}>
                      <span style={{ fontSize: 13.5, fontWeight: 500, lineHeight: 1.35, overflow: 'hidden', textOverflow: 'ellipsis', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical' }}>
                        {n.title}
                      </span>
                      <span style={{ fontSize: 11.5, color: 'var(--ink-3)', marginTop: 2 }}>
                        {n.tags.map((t) => '@' + childById(t).first).join(' ')} · {n.area}
                      </span>
                    </span>
                    <span style={{ fontSize: 11, color: 'var(--ink-3)', flex: '0 0 auto', marginTop: 2 }}>{n.time}</span>
                  </button>
                ))}
              </div>
            ))}
          </div>
        );
      }

      function MobileNoteOne({ noteId, appended, isNew }) {
        const n = NOTES.find((x) => x.id === noteId) || NOTES[0];
        return (
          <div>
            <h1
              className="serif editable"
              contentEditable
              suppressContentEditableWarning
              spellCheck={false}
              data-placeholder="Untitled note"
              style={{ fontWeight: 500, fontSize: 22, lineHeight: 1.2, margin: '6px 0 8px' }}
            >
              {!isNew && n.title}
            </h1>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 12 }}>
              {isNew ? (
                <>
                  <button className="chip">
                    <IconAt size={11} stroke={1.8} /> Tag a child
                  </button>
                  <span className="chip">Wed · May 20</span>
                </>
              ) : (
                <>
                  {n.tags.map((t) => {
                    const c = childById(t);
                    return (
                      <span key={t} className={'chip ' + c.tone}>
                        <span className="dot" /> @{c.first}
                      </span>
                    );
                  })}
                  <span className="chip">Wed · May 20</span>
                  <span className="chip">{n.area}</span>
                </>
              )}
            </div>
            <div
              className="hand editable"
              contentEditable
              suppressContentEditableWarning
              spellCheck={false}
              data-placeholder="Wednesday morning · work cycle"
              style={{ color: 'var(--clay)', fontSize: 17, margin: '12px 0 4px', fontWeight: 500 }}
            >
              {!isNew && n.stamp}
            </div>
            <div className="note-body">
              {isNew ? (
                <p
                  className="editable"
                  contentEditable
                  suppressContentEditableWarning
                  spellCheck={false}
                  data-placeholder="Tap to type, or use the mic below to record…"
                  style={{ fontSize: 14.5, lineHeight: 1.65 }}
                />
              ) : (
                n.body.map((seg, i) => (
                  <p
                    key={i}
                    className="editable"
                    contentEditable
                    suppressContentEditableWarning
                    spellCheck={false}
                    style={{ fontSize: 14.5, lineHeight: 1.65 }}
                  >
                    {seg.mention && <span className="mention">@{seg.mention}</span>}
                    {seg.text}
                    {seg.work && <span className="work">{seg.work}</span>}
                    {seg.textEnd}
                  </p>
                ))
              )}
              {appended && (
                <p className="added">
                  <em>{appended.trim()}</em>
                </p>
              )}
            </div>
          </div>
        );
      }

      function MobileReportsList({ onNew, onOpen, onPreview }) {
        const groups = [
          { key: 'today', label: 'Today' },
          { key: 'yesterday', label: 'Yesterday' },
          { key: 'thisweek', label: 'Earlier this week' },
          { key: 'earlier', label: 'Earlier' },
        ];
        return (
          <div>
            <h1 className="ios-h">Reports</h1>
            <p className="ios-sub">Six reports in progress across Primrose Room.</p>
            <button
              onClick={onNew}
              style={{
                display: 'grid',
                gridTemplateColumns: '48px 1fr auto',
                gap: 14,
                width: '100%',
                padding: '16px 16px 16px 14px',
                background: 'var(--ink)',
                color: 'var(--canvas)',
                borderRadius: 16,
                marginBottom: 10,
                marginTop: 6,
                textAlign: 'left',
                alignItems: 'center',
                boxShadow: 'var(--shadow-2)',
              }}
            >
              <span
                style={{
                  width: 44,
                  height: 44,
                  borderRadius: 999,
                  background: 'rgba(255,255,255,0.10)',
                  display: 'inline-flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  flex: '0 0 auto',
                }}
              >
                <IconReport size={22} stroke={1.6} />
              </span>
              <span style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                <span className="serif" style={{ fontWeight: 500, fontSize: 17, lineHeight: 1.15 }}>
                  Draft a new report
                </span>
                <span style={{ fontSize: 11.5, color: 'rgba(245, 240, 224, 0.7)' }}>
                  Pick child &amp; template
                </span>
              </span>
              <span
                style={{
                  width: 28,
                  height: 28,
                  borderRadius: 999,
                  background: 'var(--canvas)',
                  color: 'var(--ink)',
                  display: 'inline-flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                }}
              >
                <IconArrowRight size={14} stroke={2} />
              </span>
            </button>

            {groups.map((g) => {
              const rows = REPORTS.filter((r) => r.updatedKey === g.key);
              if (!rows.length) return null;
              return (
                <div key={g.key} style={{ marginTop: 14 }}>
                  <div className="caps" style={{ fontSize: 10.5, marginBottom: 4 }}>{g.label}</div>
                  {rows.map((r) => {
                    const c = childById(r.child);
                    return (
                      <div
                        key={r.id}
                        onClick={onOpen}
                        role="button"
                        tabIndex={0}
                        style={{
                          display: 'flex',
                          gap: 10,
                          width: '100%',
                          textAlign: 'left',
                          padding: '10px 0',
                          borderTop: '1px dashed var(--border)',
                          alignItems: 'center',
                          cursor: 'pointer',
                        }}
                      >
                        <span
                          style={{
                            width: 32,
                            height: 32,
                            borderRadius: 999,
                            background: c.hex,
                            color: '#fff',
                            fontSize: 12,
                            fontWeight: 600,
                            display: 'inline-flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            flex: '0 0 auto',
                          }}
                        >
                          {c.initials}
                        </span>
                        <span style={{ display: 'flex', flexDirection: 'column', minWidth: 0, flex: 1 }}>
                          <span style={{ fontSize: 13.5, fontWeight: 500, lineHeight: 1.35 }}>
                            {c.first} {c.last}
                          </span>
                          <span style={{ fontSize: 11.5, color: 'var(--ink-3)', marginTop: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                            {r.template}
                          </span>
                        </span>
                        <button
                          title="Preview"
                          onClick={(e) => {
                            e.stopPropagation();
                            onPreview(r);
                          }}
                          style={{
                            width: 30,
                            height: 30,
                            borderRadius: 999,
                            border: '1px solid var(--border)',
                            background: 'var(--surface)',
                            color: 'var(--ink-2)',
                            display: 'inline-flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            flex: '0 0 auto',
                          }}
                        >
                          <IconEye size={14} stroke={1.7} />
                        </button>
                        <span
                          style={{
                            fontSize: 10.5,
                            fontWeight: 500,
                            padding: '2px 8px',
                            borderRadius: 999,
                            background: r.tone === 'sent' ? 'var(--sage-soft)' : 'var(--butter-soft)',
                            color: r.tone === 'sent' ? 'var(--sage-deep)' : 'var(--butter-deep)',
                            flex: '0 0 auto',
                          }}
                        >
                          {r.status}
                        </span>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        );
      }

      function MobileReportsPick({ onOpen, onPreviewTemplate }) {
        const [pickedChild, setPickedChild] = useState('maya');
        return (
          <div>
            <h1 className="ios-h">Start a report</h1>
            <p className="ios-sub">Pick a child, then a template.</p>

            <div className="caps" style={{ marginBottom: 10 }}>Children</div>
            <div style={{ display: 'flex', gap: 10, overflowX: 'auto', paddingBottom: 12, marginLeft: -16, paddingLeft: 16, marginRight: -16 }}>
              {CHILDREN.map((c) => (
                <button
                  key={c.id}
                  onClick={() => setPickedChild(c.id)}
                  style={{
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    gap: 6,
                    flex: '0 0 auto',
                    padding: '8px 6px',
                    borderRadius: 12,
                    background: pickedChild === c.id ? 'var(--muted)' : 'transparent',
                  }}
                >
                  <span style={{ width: 48, height: 48, borderRadius: 999, background: c.hex, color: '#fff', fontWeight: 600, fontSize: 16, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
                    {c.initials}
                  </span>
                  <span style={{ fontSize: 11.5, fontWeight: 500 }}>{c.first}</span>
                </button>
              ))}
            </div>

            <div className="caps" style={{ marginBottom: 8, marginTop: 6 }}>
              Templates for {childById(pickedChild).first}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {TEMPLATES.map((t) => (
                <div
                  key={t.id}
                  onClick={onOpen}
                  role="button"
                  tabIndex={0}
                  style={{
                    background: 'var(--surface)',
                    border: '1px solid var(--border)',
                    borderRadius: 12,
                    padding: '12px 14px',
                    textAlign: 'left',
                    display: 'flex',
                    flexDirection: 'column',
                    gap: 4,
                    cursor: 'pointer',
                  }}
                >
                  <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>{t.name}</div>
                      <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 2 }}>{t.desc}</div>
                      <div style={{ fontSize: 11, color: 'var(--ink-3)', marginTop: 4 }}>{t.time}</div>
                    </div>
                    <button
                      title="Preview template"
                      onClick={(e) => {
                        e.stopPropagation();
                        onPreviewTemplate(t);
                      }}
                      style={{
                        width: 30,
                        height: 30,
                        borderRadius: 999,
                        border: '1px solid var(--border)',
                        background: 'var(--canvas)',
                        color: 'var(--ink-2)',
                        display: 'inline-flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        flex: '0 0 auto',
                      }}
                    >
                      <IconEye size={14} stroke={1.7} />
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      function MobileReportDoc({ ghost, settled, onPreview }) {
        return (
          <div>
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '16px 16px', marginBottom: 14 }}>
              <div className="caps" style={{ fontSize: 9.5, marginBottom: 6 }}>Spring Progress Report · Term 2</div>
              <h2 className="serif" style={{ fontWeight: 500, fontSize: 22, margin: '0 0 2px' }}>Maya Chen</h2>
              <div style={{ color: 'var(--ink-2)', fontSize: 12.5, marginBottom: 14 }}>Age 4y 5m · with Sarah Kovač</div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                <button
                  onClick={onPreview}
                  style={{
                    background: 'var(--terracotta)',
                    color: '#fff',
                    padding: '8px 14px',
                    borderRadius: 999,
                    fontSize: 12.5,
                    fontWeight: 500,
                    display: 'inline-flex',
                    gap: 6,
                    alignItems: 'center',
                    flex: '1 1 auto',
                    justifyContent: 'center',
                  }}
                >
                  <IconEye size={13} stroke={1.8} /> Preview PDF
                </button>
                <button
                  style={{
                    background: 'var(--canvas)',
                    color: 'var(--ink)',
                    border: '1px solid var(--border)',
                    padding: '8px 14px',
                    borderRadius: 999,
                    fontSize: 12.5,
                    fontWeight: 500,
                    display: 'inline-flex',
                    gap: 6,
                    alignItems: 'center',
                  }}
                >
                  <IconDownload size={13} stroke={1.8} /> Download
                </button>
              </div>
            </div>

            {[
              {
                key: 'practical',
                lead: '01',
                title: 'Practical Life',
                body: 'Maya has grown steadier and more deliberate this term. She carries the water pitcher confidently and returns her materials without prompting.',
              },
              {
                key: 'sensorial',
                lead: '02',
                title: 'Sensorial',
                body: 'Maya builds the pink tower consistently and has begun pairing it with the brown stair.',
              },
              {
                key: 'language',
                lead: '03',
                title: 'Language',
                body: 'Maya moved into the moveable alphabet this term. Her concentration during reading work has lengthened to roughly twenty-five minutes.',
              },
              {
                key: 'math',
                lead: '04',
                title: 'Math',
                body: 'Maya is working steadily with the number rods, counting one to seven and self-correcting.',
              },
              {
                key: 'whole',
                lead: '05',
                title: 'Whole-child observations',
                body: 'Maya brings a quiet, sustained focus to her work, observant of others and quick to offer help.',
              },
            ].map((s) => (
              <section key={s.key} style={{ marginBottom: 18 }}>
                <h3 className="serif" style={{ fontWeight: 500, fontSize: 17, margin: '0 0 6px' }}>
                  <span className="caps" style={{ marginRight: 8, fontSize: 9.5 }}>{s.lead}</span>
                  {s.title}
                </h3>
                <div style={{ height: 1, background: 'var(--border)', margin: '4px 0 8px' }} />
                <p style={{ fontSize: 13.5, lineHeight: 1.65, margin: 0 }}>{s.body}</p>
                {ghost[s.key] && (
                  <p className={'added' + (settled[s.key] ? ' settled' : '')} style={{ fontSize: 13.5, lineHeight: 1.65, marginTop: 8 }}>
                    {ghost[s.key]}
                  </p>
                )}
              </section>
            ))}

            <div style={{ marginTop: 16, paddingTop: 14, borderTop: '1px solid var(--border)' }}>
              <div className="hand" style={{ fontSize: 22, color: 'var(--ink)' }}>Sarah Kovač</div>
              <div style={{ fontSize: 11.5, color: 'var(--ink-3)' }}>Lead Guide · Primrose Room · May 19, 2026</div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
